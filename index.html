                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={newRegionInput}
                                                onChange={(e) => setNewRegionInput(e.target.value)}
                                                onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); addRegion(); } }}
                                                placeholder="e.g. US-MA-023"
                                                className="flex-grow bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none"
                                            />
                                            <button onClick={addRegion} className="bg-teal-500 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition shrink-0">+ Add</button>
                                        </div>
                                        {ebirdRegions.length > 0 && (
                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                                {ebirdRegions.map(code => (
                                                    <span key={code} className="flex items-center gap-1.5 bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-[10px] font-mono text-slate-300">
                                                        {code}
                                                        <button onClick={() => removeRegion(code)} className="text-slate-500 hover:text-rose-400 font-bold">✕</button>
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                        <p className="text-[9px] text-slate-500">Sync pulls recent + notable sightings for every region listed here. Barnstable County, MA is US-MA-001 — region codes appear in eBird's Explore page URLs (county = subnational2, state = subnational1).</p>
                                    </div>
                                </div>
                                <div className="bg-slate-950 border border-slate-800 rounded-xl p-3 flex flex-wrap items-center justify-between gap-3 text-[10px] text-slate-400">
                                    <div className="space-y-0.5">
                                        <div>Species codes synced: <strong className="text-teal-400">{Object.keys(taxonomyMap).length}</strong>{taxonomySyncedAt ? ` (as of ${new Date(taxonomySyncedAt).toLocaleDateString()})` : ' (not yet synced)'}</div>
                                        <div>Region sightings last synced: <strong className="text-teal-400">{ebirdSyncedAt ? new Date(ebirdSyncedAt).toLocaleString() : 'never'}</strong></div>
                                        {syncError && <div className="text-rose-400">Last sync error: {syncError}</div>}
                                    </div>
                                    <button
                                        onClick={() => runEbirdSync({ silent: false })}
                                        disabled={isSyncing}
                                        className="bg-teal-500 disabled:opacity-50 text-slate-950 font-bold px-4 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition"
                                    >
                                        {isSyncing ? 'Syncing…' : 'Sync Now'}
                                    </button>
                                </div>
                                <p className="text-[9px] text-slate-500">Auto-syncs once a day whenever this page is opened (this is a static PWA with no server, so it can't run in the background — opening the app is what triggers the daily check). Pulls both recent and notable/rare sightings for your region and merges them in without touching existing entries or manual seen overrides.</p>

                                <div className="border-t border-slate-800 pt-4">
                                    <h4 className="text-xs font-bold text-slate-200 mb-2">Hidden Hotspots ({hiddenLocations.length})</h4>
                                    {hiddenLocations.length === 0 ? (
                                        <p className="text-[10px] text-slate-500">None hidden. Use the 🙈 icon on any hotspot card to hide it — hidden hotspots also stay excluded from future eBird syncs.</p>
                                    ) : (
                                        <div className="space-y-1.5 max-h-40 overflow-y-auto pr-1">
                                            {hiddenLocations.map(loc => (
                                                <div key={loc} className="flex items-center justify-between gap-2 bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-[11px]">
                                                    <span className="text-slate-300 truncate">{loc}</span>
                                                    <button onClick={() => unhideLocation(loc)} className="text-teal-400 hover:underline font-bold shrink-0">Restore</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="border-t border-slate-800 pt-4 space-y-2">
                                    <h4 className="text-xs font-bold text-slate-200">Merge Hotspots</h4>
                                    <p className="text-[10px] text-slate-500">For hotspots that are really the same place under different names (e.g. "Race Point" / "Race Point Beach"). Nothing merges automatically — pick a suggestion below or select manually, confirm the name, then merge.</p>

                                    {suggestedMergeGroups.length > 0 && (
                                        <div className="space-y-1.5">
                                            <span className="text-[9px] text-slate-500 uppercase tracking-wider font-bold">Looks similar</span>
                                            {suggestedMergeGroups.map((group, idx) => (
                                                <div key={idx} className="flex items-center justify-between gap-2 bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-[10px]">
                                                    <span className="text-slate-300 truncate">{group.join(' · ')}</span>
                                                    <button onClick={() => applySuggestedGroup(group)} className="text-teal-400 hover:underline font-bold shrink-0">Select</button>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="space-y-1.5 max-h-40 overflow-y-auto pr-1 border border-slate-800 rounded-lg p-2 bg-slate-950">
                                        {Array.from(new Set(birdRecords.map(r => r.locationName))).filter(Boolean).sort().map(name => (
                                            <label key={name} className="flex items-center gap-2 text-[11px] text-slate-300 cursor-pointer">
                                                <input type="checkbox" checked={selectedMergeNames.has(name)} onChange={() => toggleMergeSelection(name)} className="accent-teal-500" />
                                                <span className="truncate">{name}</span>
                                            </label>
                                        ))}
                                    </div>

                                    {selectedMergeNames.size > 0 && (
                                        <div className="flex flex-wrap items-center gap-2 pt-1">
                                            <input
                                                type="text"
                                                value={mergeCanonicalName}
                                                onChange={(e) => setMergeCanonicalName(e.target.value)}
                                                placeholder="Final hotspot name"
                                                className="flex-1 min-w-[140px] bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 text-xs focus:outline-none"
                                            />
                                            <button onClick={handleMergeHotspots} className="bg-teal-500 text-slate-950 font-bold px-4 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition shrink-0">
                                                Merge {selectedMergeNames.size} Selected
                                            </button>
                                        </div>
                                    )}
                                </div>

                                <div className="border-t border-slate-800 pt-4 space-y-2">
                                    <h4 className="text-xs font-bold text-slate-200">Merged Hotspots ({Object.keys(mergeHistory).length})</h4>
                                    {Object.keys(mergeHistory).length === 0 ? (
                                        <p className="text-[10px] text-slate-500">No merges yet. Once you merge hotspots above, they'll show up here with options to rename the result or undo the merge.</p>
                                    ) : (
                                        <div className="space-y-1.5 max-h-52 overflow-y-auto pr-1">
                                            {Object.entries(mergeHistory).map(([canonicalName, entry]) => (
                                                <div key={canonicalName} className="bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-[11px] space-y-1">
                                                    {editingMergeName === canonicalName ? (
                                                        <div className="flex items-center gap-1.5">
                                                            <input
                                                                type="text"
                                                                autoFocus
                                                                value={editingMergeNameDraft}
                                                                onChange={(e) => setEditingMergeNameDraft(e.target.value)}
                                                                onKeyDown={(e) => { if (e.key === 'Enter') saveRenameMergedHotspot(); if (e.key === 'Escape') setEditingMergeName(null); }}
                                                                className="flex-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-[11px] text-slate-100 focus:outline-none"

        }

        // Shared thumbnail cache (module-level, outside the component) so switching filters or
        // re-mounting rows doesn't re-fetch images already looked up this session. Persisted to
        // localStorage too, so it survives reloads. null = "looked up, no image found" (also cached,
        // to avoid retrying known-missing birds every render).
        const THUMBNAIL_CACHE_KEY = 'cbc_thumbnailCache';
        let thumbnailCache = (() => {
            try {
                const raw = window.localStorage.getItem(THUMBNAIL_CACHE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) { return {}; }
        })();
        const persistThumbnailCache = () => {
            try { window.localStorage.setItem(THUMBNAIL_CACHE_KEY, JSON.stringify(thumbnailCache)); } catch (e) { /* ignore */ }
        };

        // Live image lookup utility component via Wikipedia summaries API
        function BirdThumbnail({ birdName }) {
            const cached = Object.prototype.hasOwnProperty.call(thumbnailCache, birdName) ? thumbnailCache[birdName] : undefined;
            const [imgUrl, setImgUrl] = useState(cached !== undefined ? cached : null);
            const [loading, setLoading] = useState(cached === undefined);

            useEffect(() => {
                if (cached !== undefined) return; // already resolved (image URL or known-missing)
                let active = true;
                async function fetchImage() {
                    try {
                        const searchName = birdName.replace(/\s*\([^)]*\)\s*/g, '').trim() || birdName;
                        const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(searchName)}`);
                        if (!response.ok) throw new Error('Wiki summary lookup error');
                        const data = await response.json();
                        const url = (data.thumbnail && data.thumbnail.source) ? data.thumbnail.source : null;
                        thumbnailCache[birdName] = url;
                        persistThumbnailCache();
                        if (active) {
                            setImgUrl(url);
                            setLoading(false);
                        }
                    } catch (e) {
                        if (active) setLoading(false);
                    }
                }
                fetchImage();
                return () => { active = false; };
            }, [birdName]);

            if (loading) {
                return <div className="w-12 h-12 bg-slate-900 rounded-xl border border-slate-800/80 animate-pulse shrink-0" />;
            }

            if (imgUrl) {
                return (
                    <img 
                        src={imgUrl} 
                        alt={birdName} 
                        className="w-12 h-12 object-cover rounded-xl border border-slate-800 shrink-0 shadow" 
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                );
            }

            return (
                <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center shrink-0 border border-slate-800/80">
                    <svg className="w-5 h-5 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </div>
            );
        }

        // Note: the TSV format no longer carries a "Seen" column. Seen/unseen status is
        // derived at render time by comparing each bird against the uploaded eBird life list
        // (see computeSeen / useLifeListSet below), with room for manual overrides that survive
        // TSV re-imports (see seenOverrides state in App). A "Region" column (eBird region code,
        // e.g. US-MA-001) was added for multi-region support, and a "Checklist ID" column (eBird
        // submission ID, e.g. S123456789) links a sighting back to the exact checklist it came
        // from. Both are optional/blank for older or manually-added rows.
        function parseTSV(text) {
            const lines = text.trim().split('\n');
            const result = [];
            let currentLoc = "";
            let currentCoords = "";

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (i === 0 && line.toLowerCase().includes('location name')) continue; 
                const cols = line.split('\t');
                if (cols.length < 3) continue;

                let loc = cols[0].trim();
                let coords = cols[1].trim();
                const bird = cols[2].trim();
                const rare = cols[3]?.trim() || "N";
                const date = cols[4]?.trim() || "";
                const region = cols[5]?.trim() || "";
                const checklistId = cols[6]?.trim() || "";

                if (loc !== "") {
                    currentLoc = loc;
                    currentCoords = coords;
                }

                result.push({
                    id: `${currentLoc}-${bird}-${i}`,
                    locationName: currentLoc,
                    coordinates: currentCoords,
                    bird: bird,
                    rare: rare,
                    lastReported: date,
                    region: region,
                    checklistId: checklistId
                });
            }
            return result;
        }

        function recordsToTSV(records) {
            const header = "Location Name\tCoordinates\tBird\tRare (Y/N)\tLast Reported\tRegion\tChecklist ID";
            let lastLoc = "";
            let lastCoords = "";
            const rows = records.map(r => {
                let locCol = "";
                let coordCol = "";
                if (r.locationName !== lastLoc || r.coordinates !== lastCoords) {
                    locCol = r.locationName;
                    coordCol = r.coordinates;
                    lastLoc = r.locationName;
                    lastCoords = r.coordinates;
                }
                return `${locCol}\t${coordCol}\t${r.bird}\t${r.rare}\t${r.lastReported}\t${r.region || ''}\t${r.checklistId || ''}`;
            });
            return [header, ...rows].join('\n');
        }

        // Strips parenthetical subspecies/form qualifiers and normalizes case for matching,
        // e.g. "Willet (Eastern)" -> "willet", so life-list comparisons aren't thrown off by them.
        function normalizeBirdName(name) {
            return (name || "").replace(/\s*\([^)]*\)\s*/g, "").trim().toLowerCase();
        }

        // Formats a Date as "Thursday, July 9, 2026" to match this app's Last Reported style.
        function formatLongDate(dt) {
            return isNaN(dt) ? '' : dt.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // Parses a date string as LOCAL time, always — safe to call on either this app's own
        // "Weekday, Month Day, Year" display strings (see formatLongDate) or on raw ISO-ish
        // "YYYY-MM-DD" / "YYYY-MM-DD HH:MM" strings coming straight from eBird/docx sources.
        // Only the latter shape needs help: a bare ISO date-only string parses as UTC midnight
        // per the JS spec, which rolls back to the *previous* calendar day once rendered in a
        // timezone behind UTC (all of the US) — so a sighting truly reported "today" could get
        // silently mislabeled "yesterday" and vanish from a "Last 24h" filter. Forcing a local
        // time component onto exactly that shape fixes it; every other string (including this
        // app's display format, which already parses correctly as local time) is left alone —
        // running that same transform on a non-ISO string would mangle it into "Invalid Date".
        function parseFlexibleDate(str) {
            if (!str) return new Date(NaN);
            const trimmed = String(str).trim();
            const isoMatch = /^(\d{4}-\d{2}-\d{2})(?:[ T](\d{1,2}:\d{2}))?$/.exec(trimmed);
            if (isoMatch) {
                return new Date(`${isoMatch[1]}T${isoMatch[2] || '00:00'}:00`);
            }
            return new Date(trimmed);
        }

        // Parses an uploaded eBird life list CSV export and returns a sorted array of unique
        // Common Names. Handles quoted fields (commas inside quotes) per standard CSV escaping.
        function parseLifeListCSV(text) {
            const rows = [];
            let row = [], field = "", inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (inQuotes) {
                    if (c === '"') {
                        if (text[i + 1] === '"') { field += '"'; i++; }
                        else inQuotes = false;
                    } else field += c;
                } else {
                    if (c === '"') inQuotes = true;
                    else if (c === ',') { row.push(field); field = ""; }
                    else if (c === '\n' || c === '\r') {
                        if (c === '\r' && text[i + 1] === '\n') i++;
                        row.push(field); field = "";
                        rows.push(row); row = [];
                    } else field += c;
                }
            }
            if (field !== "" || row.length > 0) { row.push(field); rows.push(row); }
            if (rows.length === 0) return [];

            const header = rows[0].map(h => h.trim().toLowerCase());
            const nameIdx = header.indexOf('common name');
            if (nameIdx === -1) return [];

            const names = new Set();
            for (let i = 1; i < rows.length; i++) {
                const val = rows[i][nameIdx]?.trim();
                if (val) names.add(val);
            }
            return Array.from(names).sort();
        }

        // Parses a raw eBird "rare bird alert" style report (as exported to .docx, or plain
        // text/TSV) with lines like: Bird Name<TAB>Location<TAB>(lat, lng)<TAB>YYYY-MM-DD HH:MM
        // Returns sighting records compatible with the main record shape, deduped to the most
        // recent report per location+bird. Every entry is treated as Rare, matching the source
        // report's "unseen rare alerts" framing.
        function parseAlertReport(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            const byKey = new Map();
            const lineRe = /^(.+?)\t(.+?)\t\(([-\d.]+),\s*([-\d.]+)\)\t(\d{4}-\d{2}-\d{2}(?:\s+\d{2}:\d{2})?)$/;

            for (const line of lines) {
                const m = line.match(lineRe);
                if (!m) continue;
                const [, bird, location, lat, lng, dateStr] = m;
                const key = `${location.trim().toLowerCase()}|${bird.trim().toLowerCase()}`;
                const dt = parseFlexibleDate(dateStr);
                const existing = byKey.get(key);
                if (!existing || dt > existing.dt) {
                    byKey.set(key, {
                        locationName: location.trim(),
                        coordinates: `${lat}, ${lng}`,
                        bird: bird.trim(),
                        rare: 'Y',
                        dt,
                        lastReported: isNaN(dt) ? dateStr : formatLongDate(dt)
                    });
                }
            }
            return Array.from(byKey.values());
        }

        // Safety net: without this, an uncaught error anywhere in App (a bad CDN load, an
        // unexpected API response shape, etc.) unmounts the entire React tree and leaves a
        // blank white page with no clue why. This catches that and shows a visible, recoverable
        // message instead — data in localStorage is untouched either way.
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { error: null };
            }
            static getDerivedStateFromError(error) {
                return { error };
            }
            componentDidCatch(error, info) {
                console.error('Birding Console crashed:', error, info);
            }
            render() {
                if (this.state.error) {
                    return (
                        <div className="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-6">
                            <div className="max-w-md space-y-4 text-center">
                                <div className="text-4xl">🦉</div>
                                <h1 className="text-lg font-black text-rose-400">Something broke</h1>
                                <p className="text-sm text-slate-400">The app hit an unexpected error and couldn't render. Your saved data (life lists, sightings, settings) is untouched in this browser's storage — reloading is safe to try.</p>
                                <pre className="text-left text-[10px] text-slate-500 bg-slate-900 border border-slate-800 rounded-lg p-3 overflow-auto max-h-32">{String(this.state.error && this.state.error.message || this.state.error)}</pre>
                                <button onClick={() => window.location.reload()} className="bg-teal-500 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs hover:bg-teal-400 transition">Reload</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
