<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Cape Cod Bird Sightings</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .leaflet-popup-content-wrapper { background: #0f172a !important; color: #f1f5f9 !important; border: 1px solid #334155 !important; border-radius: 12px !important; }
        .leaflet-popup-tip { background: #0f172a !important; border: 1px solid #334155 !important; }
        .leaflet-container { touch-action: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        const INITIAL_RAW_DATA = `Location Name	Coordinates	Bird	Rare (Y/N)	Last Reported
Barnstable Clean Water Coalition Cranberry Bogs	41.6714674, -70.4275267	Canada Goose	N	Thursday, July 9, 2026
		Mute Swan	N	Thursday, July 9, 2026
		Mallard	N	Thursday, July 9, 2026
		Mourning Dove	N	Thursday, July 9, 2026
		Great Egret	N	Thursday, July 9, 2026
		Great Blue Heron	N	Thursday, July 9, 2026
		Red-bellied Woodpecker	N	Thursday, July 9, 2026
		Red-tailed Hawk	N	Thursday, July 9, 2026`;

        function App() {
            const [rawData, setRawData] = useState(INITIAL_RAW_DATA);
            const [lifeList, setLifeList] = useState(new Set());
            const [manualSeen, setManualSeen] = useState(new Set());
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL'); 
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL');
            const [sortBy, setSortBy] = useState('bird');
            const [mapStyle, setMapStyle] = useState('dark');
            const [toastMsg, setToastMsg] = useState('');
            
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayerGroup = useRef(null);

            const birdRecords = useMemo(() => {
                const lines = rawData.trim().split('\n');
                const result = [];
                let currentLoc = "";
                let currentCoords = "";
                lines.forEach((line, i) => {
                    if (i === 0 && line.toLowerCase().includes('location name')) return;
                    const cols = line.split('\t');
                    if (cols.length < 3) return;
                    if (cols[0].trim() !== "") { currentLoc = cols[0].trim(); currentCoords = cols[1].trim(); }
                    
                    const bird = cols[2].trim();
                    const id = `${currentLoc}-${bird}-${i}`;
                    
                    // A bird is 'seen' if it's in the lifeList OR manually marked
                    const isSeen = lifeList.has(bird) || manualSeen.has(id);

                    result.push({
                        id,
                        locationName: currentLoc,
                        coordinates: currentCoords,
                        bird,
                        rare: cols[3]?.trim() || 'N',
                        lastReported: cols[4]?.trim() || '',
                        seen: isSeen
                    });
                });
                return result;
            }, [rawData, lifeList, manualSeen]);

            const filteredRecords = useMemo(() => {
                return birdRecords.filter(r => {
                    const matchesSearch = r.bird.toLowerCase().includes(searchQuery.toLowerCase()) || r.locationName.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesLoc = selectedLocation === 'ALL' || r.locationName === selectedLocation;
                    const matchesBird = selectedBird === 'ALL' || r.bird === selectedBird;
                    if (statusFilter === 'SEEN' && !r.seen) return false;
                    if (statusFilter === 'UNSEEN' && r.seen) return false;
                    if (statusFilter === 'RARE' && r.rare !== 'Y') return false;
                    return matchesSearch && matchesLoc && matchesBird;
                });
            }, [birdRecords, searchQuery, statusFilter, selectedLocation, selectedBird]);

            // Handle file upload for Life List
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const lines = text.split('\n');
                    const foundBirds = new Set();
                    // Assumes CSV eBird export: "Common Name" is often column 1 or 2
                    lines.forEach(line => {
                        const parts = line.split(',');
                        if (parts.length > 1) {
                            // Basic heuristic to grab common name
                            const name = parts[1].replace(/"/g, '').trim();
                            foundBirds.add(name);
                        }
                    });
                    setLifeList(foundBirds);
                    showToast("Life list imported!");
                };
                reader.readAsText(file);
            };

            const toggleManualSeen = (record) => {
                setManualSeen(prev => {
                    const next = new Set(prev);
                    if (next.has(record.id)) next.delete(record.id);
                    else next.add(record.id);
                    return next;
                });
            };

            return (
                <div className="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
                    <header className="mb-8">
                        <h1 className="text-3xl font-black text-teal-400">CAPE COD BIRD SIGHTINGS</h1>
                        <p className="text-slate-400">Interactive Cape Cod Bird Sighting Portal</p>
                        <button onClick={() => setShowSyncPanel(!showSyncPanel)} className="mt-4 bg-slate-800 px-4 py-2 rounded text-xs font-bold">Sync Data / Import CSV</button>
                    </header>

                    {showSyncPanel && (
                        <div className="bg-slate-900 p-4 rounded-lg mb-6 border border-slate-700">
                            <label className="block text-xs font-bold mb-2">Upload eBird Life List (CSV)</label>
                            <input type="file" onChange={handleFileUpload} className="text-xs" />
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        {/* Map & Controls */}
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <h2 className="text-lg font-bold mb-3">Sighting Map</h2>
                                <div ref={mapContainerRef} className="h-64 w-full rounded-xl" />
                            </div>
                        </div>

                        {/* Species Ledger */}
                        <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 max-h-[800px] overflow-y-auto">
                            <h2 className="text-lg font-bold mb-4">Species Ledger</h2>
                            {filteredRecords.map(r => (
                                <div key={r.id} onClick={() => setSelectedBird(r.bird)} className={`p-3 mb-2 rounded-lg flex items-center justify-between cursor-pointer border ${selectedBird === r.bird ? 'border-teal-500' : 'border-transparent'} bg-slate-950`}>
                                    <div className="flex items-center gap-3">
                                        <div className="font-bold">{r.bird}</div>
                                        <a href={`https://ebird.org/search?q=${encodeURIComponent(r.bird)}`} target="_blank" className="text-teal-400 text-[10px]">eBird ↗</a>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); toggleManualSeen(r); }} className={`px-2 py-1 rounded text-[10px] ${r.seen ? 'bg-teal-500' : 'bg-slate-800'}`}>
                                        {r.seen ? 'Seen' : 'Mark'}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
