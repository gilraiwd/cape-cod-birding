<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // No seed data — the app starts empty. Populate it by syncing eBird (Settings > Sync Now),
        // uploading a sighting report, or adding sightings manually with "+ Sighting".
        const INITIAL_RAW_DATA = `Location Name	Coordinates	Bird	Rare (Y/N)	Last Reported`;

        // No default life list — "Seen" status is blank until a real life list is uploaded
        // (Import > Upload Life List CSV). Upload one per person to share this site; each gets
        // labeled and switchable, so nobody's data overwrites anyone else's (see savedLifeLists).
        const DEFAULT_LIFE_LIST = [];

        // Small curated fallback map, used only until the live eBird taxonomy has been
        // synced (see Settings > eBird API Key). Kept intentionally short — hand-typed
        // species code lists are exactly how wrong/missing links happen at scale, which is
        // why the app prefers the live taxonomy sync below for anything beyond these basics.
        const STATIC_EBIRD_CODE_MAP = {
            "Canada Goose": "cangoo",
            "Mallard": "mallar3",
            "Mourning Dove": "moudo1",
            "Great Blue Heron": "gbhero",
            "Red-tailed Hawk": "rthawk",
            "Osprey": "osprey",
            "Killdeer": "killde",
            "Common Loon": "comloo",
            "Double-crested Cormorant": "doccor",
            "Turkey Vulture": "turvul",
            "Bald Eagle": "baleag",
            "Ruby-throated Hummingbird": "rthhum"
        };

        // Resolves a bird's eBird species page URL. Prefers the live taxonomy map (synced
        // from eBird's official /ref/taxonomy/ebird endpoint — see Settings), falls back to
        // the small static map above, and only falls back to a plain search link if neither
        // has a match (e.g. taxonomy hasn't been synced yet, or the name doesn't resolve).
        function getEBirdUrl(birdName, taxonomyMap) {
            const cleanName = birdName.trim();
            const normalized = normalizeBirdName(cleanName);
            const liveCode = taxonomyMap && (taxonomyMap[normalized] || taxonomyMap[cleanName.toLowerCase()]);
            if (liveCode) {
                return `https://ebird.org/species/${liveCode}`;
            }
            const staticCode = STATIC_EBIRD_CODE_MAP[cleanName];
            if (staticCode) {
                return `https://ebird.org/species/${staticCode}`;
            }
            return `https://ebird.org/search?q=${encodeURIComponent(cleanName)}`;
        }

        // Safe localStorage helpers (no-ops if storage is unavailable, e.g. private browsing)
            const storageGet = (key, fallback) => {
                try {
                    const raw = window.localStorage.getItem(key);
                    return raw !== null ? JSON.parse(raw) : fallback;
                } catch (e) { return fallback; }
            };
            const storageSet = (key, value) => {
                try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
            };
            // This app's stored-data shape has changed several times as features were added
            // (life lists went from a flat array to named lists, regions went from a single
            // string to an array, etc). A value left over from an older version — or corrupted
            // by a partial write — won't match what the current code expects, and something as
            // simple as `undefinedThing.map(...)` then takes the whole app down. These two
            // wrappers validate the *type* of whatever came out of storage before trusting it,
            // so a stale/malformed value degrades to the fallback instead of crashing.
            const storageGetArray = (key, fallback) => {
                const val = storageGet(key, fallback);
                return Array.isArray(val) ? val : fallback;
            };
            const storageGetObject = (key, fallback) => {
                const val = storageGet(key, fallback);
                return (val && typeof val === 'object' && !Array.isArray(val)) ? val : fallback;
            };

        function App() {
            const [rawData, setRawData] = useState(() => storageGet('cbc_rawData', INITIAL_RAW_DATA));
            const [pastedData, setPastedData] = useState('');
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const [showImportPanel, setShowImportPanel] = useState(false);

            // Multiple named eBird life lists (Common Names), so this site can be shared — a
            // friend uploads their own life list export and switches to it to see their own
            // gaps, without anyone's data overwriting anyone else's. Seeded with the original
            // life list under "My Life List" the first time this loads (backward-compatible
            // with the previous single-life-list version of this app).
            const [savedLifeLists, setSavedLifeLists] = useState(() => {
                const existing = storageGetObject('cbc_savedLifeLists', null);
                if (existing && Object.keys(existing).length > 0) {
                    // Sanitize entry-by-entry: keep only entries that actually have a valid
                    // names array, in case an earlier version wrote something malformed.
                    const sanitized = {};
                    Object.entries(existing).forEach(([id, list]) => {
                        if (list && Array.isArray(list.names)) {
                            sanitized[id] = { label: typeof list.label === 'string' ? list.label : id, names: list.names };
                        }
                    });
                    if (Object.keys(sanitized).length > 0) return sanitized;
                }
                const legacyList = storageGetArray('cbc_lifeList', DEFAULT_LIFE_LIST);
                return { default: { label: 'My Life List', names: legacyList } };
            });
            const [activeLifeListId, setActiveLifeListId] = useState(() => storageGet('cbc_activeLifeListId', 'default'));
            const [newLifeListLabel, setNewLifeListLabel] = useState('');
            // Extra safety net at the read site too, regardless of what's upstream: if
            // activeLifeListId points at a list that no longer exists (e.g. it was deleted in
            // another tab), or that entry's names somehow isn't an array, fall back rather than
            // let `.map` further down throw on an undefined value.
            const activeNames = savedLifeLists && savedLifeLists[activeLifeListId] && savedLifeLists[activeLifeListId].names;
            const lifeList = Array.isArray(activeNames) ? activeNames : DEFAULT_LIFE_LIST;

            const [seenOverrides, setSeenOverrides] = useState(() => storageGetObject('cbc_seenOverrides', {}));
            const [hiddenLocations, setHiddenLocations] = useState(() => storageGetArray('cbc_hiddenLocations', []));
            const lifeListFileRef = useRef(null);
            const reportFileRef = useRef(null);

            useEffect(() => { storageSet('cbc_rawData', rawData); }, [rawData]);
            useEffect(() => { storageSet('cbc_savedLifeLists', savedLifeLists); }, [savedLifeLists]);
            useEffect(() => { storageSet('cbc_activeLifeListId', activeLifeListId); }, [activeLifeListId]);
            useEffect(() => { storageSet('cbc_seenOverrides', seenOverrides); }, [seenOverrides]);
            useEffect(() => { storageSet('cbc_hiddenLocations', hiddenLocations); }, [hiddenLocations]);

            const lifeListSet = useMemo(() => new Set(lifeList.map(normalizeBirdName)), [lifeList]);


            // --- eBird API integration (species codes + daily region sightings) --------------
            // The key is seeded with the one you gave us so the app works immediately; it's
            // stored in localStorage from then on (not hardcoded elsewhere) and can be changed
            // any time in Settings. Note this file will contain that key in plain text — treat
            // it like any personal credential and don't publish/share this file publicly.
            const [ebirdApiKey, setEbirdApiKey] = useState(() => storageGet('cbc_ebirdApiKey', 'l531bs6l4t92'));
            const [ebirdRegions, setEbirdRegions] = useState(() => storageGetArray('cbc_ebirdRegions', ['US-MA-001'])); // Barnstable County, MA
            const [newRegionInput, setNewRegionInput] = useState('');
            const [taxonomyMap, setTaxonomyMap] = useState(() => storageGetObject('cbc_taxonomyMap', {}));
            const [taxonomySyncedAt, setTaxonomySyncedAt] = useState(() => storageGet('cbc_taxonomySyncedAt', null));
            const [ebirdSyncedAt, setEbirdSyncedAt] = useState(() => storageGet('cbc_ebirdSyncedAt', null));
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [showSettingsPanel, setShowSettingsPanel] = useState(false);
            const [legendExpanded, setLegendExpanded] = useState(false); // collapsed by default — mostly for mobile screen space

            useEffect(() => { storageSet('cbc_ebirdApiKey', ebirdApiKey); }, [ebirdApiKey]);
            useEffect(() => { storageSet('cbc_ebirdRegions', ebirdRegions); }, [ebirdRegions]);
            useEffect(() => { storageSet('cbc_taxonomyMap', taxonomyMap); }, [taxonomyMap]);
            useEffect(() => { storageSet('cbc_taxonomySyncedAt', taxonomySyncedAt); }, [taxonomySyncedAt]);
            useEffect(() => { storageSet('cbc_ebirdSyncedAt', ebirdSyncedAt); }, [ebirdSyncedAt]);

            // Effective seen status for a record: a manual override (if any) wins, otherwise
            // it's derived from whether the bird is on the life list.
            const getSeen = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                if (Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey)) {
                    return seenOverrides[overrideKey];
                }
                return lifeListSet.has(normalizeBirdName(record.bird)) ? 'Y' : 'N';
            };

            const setSeenOverride = (record, value) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => ({ ...prev, [overrideKey]: value }));
            };

            const clearSeenOverride = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => {
                    const next = { ...prev };
                    delete next[overrideKey];
                    return next;
                });
            };

            // --- Hotspot management: hide (reversible, also excluded from future eBird syncs
            // so it doesn't silently come back) or permanently delete all records for a hotspot.
            const hideLocation = (locationName) => {
                setHiddenLocations(prev => prev.includes(locationName) ? prev : [...prev, locationName]);
                if (selectedLocation === locationName) setSelectedLocation('ALL');
                showToast(`Hid "${locationName}". Restore it any time in Settings.`);
            };

            const unhideLocation = (locationName) => {
                setHiddenLocations(prev => prev.filter(l => l !== locationName));
                showToast(`Restored "${locationName}".`);
            };

            const deleteLocation = (locationName) => {
                const updated = birdRecords.filter(rec => rec.locationName !== locationName);
                setRawData(recordsToTSV(updated));
                setHiddenLocations(prev => prev.filter(l => l !== locationName));
                if (selectedLocation === locationName) setSelectedLocation('ALL');
                showToast(`Deleted all records for "${locationName}".`);
            };

            // --- Hotspot merging ----------------------------------------------------------------
            // Deliberately manual, not automatic: "Race Point" / "Race Point Beach" / "Race
            // Point, Provincetown" might be the same spot, or genuinely distinct hotspots birders
            // treat separately — that's a judgment call the data alone can't make reliably, and a
            // wrong auto-merge would quietly corrupt real data. So: suggest likely groups by
            // stripping common generic suffixes (Beach, Light, Trail, etc.) and comparing what's
            // left, but only ever merge on explicit confirmation.
            const [selectedMergeNames, setSelectedMergeNames] = useState(() => new Set());
            const [mergeCanonicalName, setMergeCanonicalName] = useState('');
            // Tracks what got merged into what, and a full snapshot of each source hotspot's
            // records exactly as they were right before merging — the only way "Unmerge" can
            // actually restore the original hotspots later, since the merge itself renames and
            // dedupes records in a way that isn't otherwise reversible. Keyed by the current
            // (possibly since-renamed) canonical name.
            const [mergeHistory, setMergeHistory] = useState(() => storageGetObject('cbc_mergeHistory', {}));
            useEffect(() => { storageSet('cbc_mergeHistory', mergeHistory); }, [mergeHistory]);
            const [editingMergeName, setEditingMergeName] = useState(null);
            const [editingMergeNameDraft, setEditingMergeNameDraft] = useState('');

            const locationCoreTokens = (name) => {
                const base = name.split(',')[0]; // drop a trailing ", Town" clause
                const stripSuffixes = ['beach', 'light', 'lighthouse', 'trail', 'trailhead', 'sanctuary', 'nwr', 'wma', 'preserve', 'landing', 'park', 'reservation', 'refuge'];
                let tokens = base.toLowerCase().split(/\s+/).filter(Boolean);
                while (tokens.length > 1 && stripSuffixes.includes(tokens[tokens.length - 1])) {
                    tokens.pop();
                }
                return tokens.join(' ');
            };

            const suggestedMergeGroups = useMemo(() => {
                try {
                    const allNames = Array.from(new Set(birdRecords.map(r => r.locationName))).filter(Boolean);
                    const byCore = new Map();
                    allNames.forEach(name => {
                        const core = locationCoreTokens(name);
                        if (!byCore.has(core)) byCore.set(core, []);
                        byCore.get(core).push(name);
                    });
                    return Array.from(byCore.values()).filter(group => group.length > 1);
                } catch (e) {
                    return [];
                }
            }, [birdRecords]);

            const toggleMergeSelection = (name) => {
                setSelectedMergeNames(prev => {
                    const next = new Set(prev);
                    if (next.has(name)) next.delete(name); else next.add(name);
                    return next;
                });
            };

            const applySuggestedGroup = (group) => {
                setSelectedMergeNames(new Set(group));
                setMergeCanonicalName(group.reduce((a, b) => (a.length >= b.length ? a : b)));
            };

            const handleMergeHotspots = () => {
                const names = Array.from(selectedMergeNames);
                if (names.length < 2) {
                    showToast("Select at least 2 hotspots to merge.");
                    return;
                }
                const canonical = mergeCanonicalName.trim() || names[0];
                let canonicalCoords = '';
                for (const n of names) {
                    const rec = birdRecords.find(r => r.locationName === n && r.coordinates);
                    if (rec) { canonicalCoords = rec.coordinates; break; }
                }

                // Build the merge-history entry for `canonical`. If any selected name was
                // itself already a merged hotspot, pull in ITS original sources/snapshot rather
                // than just its current (already-merged) rows — so unmerge always restores the
                // true original hotspots, however many merges deep this one is.
                let combinedSources = [];
                let combinedSnapshot = [];
                const consumedKeys = [];
                names.forEach(n => {
                    if (mergeHistory[n]) {
                        combinedSources.push(...mergeHistory[n].sourceNames);
                        combinedSnapshot.push(...mergeHistory[n].snapshot);
                        consumedKeys.push(n);
                    } else {
                        combinedSources.push(n);
                        combinedSnapshot.push(...birdRecords.filter(r => r.locationName === n).map(r => ({ ...r })));
                    }
                });
                setMergeHistory(prev => {
                    const next = { ...prev };
                    consumedKeys.forEach(k => delete next[k]);
                    next[canonical] = { sourceNames: Array.from(new Set(combinedSources)), snapshot: combinedSnapshot, mergedAt: Date.now() };
                    return next;
                });

                const renamed = birdRecords.map(r =>
                    names.includes(r.locationName) ? { ...r, locationName: canonical, coordinates: canonicalCoords || r.coordinates } : r
                );
                // Merging can create duplicate (location, species) pairs from the different source
                // hotspots — dedupe those the same way an eBird sync merge would: keep the newer
                // date, OR the rare flags together, and follow whichever checklist is newest.
                const byKey = new Map();
                renamed.forEach(r => {
                    const key = `${r.locationName}|${r.bird}`.toLowerCase();
                    const existing = byKey.get(key);
                    if (!existing) { byKey.set(key, r); return; }
                    const newer = parseFlexibleDate(r.lastReported) >= parseFlexibleDate(existing.lastReported);
                    byKey.set(key, {
                        ...existing,
                        rare: existing.rare === 'Y' || r.rare === 'Y' ? 'Y' : 'N',
                        lastReported: newer ? r.lastReported : existing.lastReported,
                        checklistId: newer ? (r.checklistId || existing.checklistId || '') : (existing.checklistId || r.checklistId || ''),
                        region: existing.region || r.region || ''
                    });
                });
                setRawData(recordsToTSV(Array.from(byKey.values())));

                setHiddenLocations(prev => {
                    const wasHidden = prev.some(n => names.includes(n));
                    const filtered = prev.filter(n => !names.includes(n));
                    if (wasHidden && !filtered.includes(canonical)) filtered.push(canonical);
                    return filtered;
                });
                if (names.includes(selectedLocation)) setSelectedLocation(canonical);

                setSelectedMergeNames(new Set());
                setMergeCanonicalName('');
                showToast(`Merged ${names.length} hotspots into "${canonical}".`);
            };

            // Restores a merged hotspot's original hotspots exactly as they were the moment
            // before merging. This necessarily replaces whatever the merged hotspot's records
            // look like NOW with that frozen snapshot — anything added or changed there since
            // the merge (new eBird syncs, manual edits) is lost for that hotspot specifically.
            const handleUnmergeHotspot = (canonicalName) => {
                const entry = mergeHistory[canonicalName];
                if (!entry) return;
                if (!confirm(`Unmerge "${canonicalName}" back into ${entry.sourceNames.length} separate hotspots (${entry.sourceNames.join(', ')})?\n\nAny sightings added or changed at this hotspot since the merge will be replaced by the pre-merge data.`)) return;

                const otherRecords = birdRecords.filter(r => r.locationName !== canonicalName);
                const restored = entry.snapshot.map(r => ({ ...r }));
                setRawData(recordsToTSV([...otherRecords, ...restored]));

                setMergeHistory(prev => {
                    const next = { ...prev };
                    delete next[canonicalName];
                    return next;
                });
                if (selectedLocation === canonicalName) setSelectedLocation('ALL');
                showToast(`Unmerged "${canonicalName}" back into ${entry.sourceNames.length} hotspots.`);
            };

            const startRenameMergedHotspot = (name) => {
                setEditingMergeName(name);
                setEditingMergeNameDraft(name);
            };

            const saveRenameMergedHotspot = () => {
                const oldName = editingMergeName;
                const newName = editingMergeNameDraft.trim();
                if (!oldName || !newName || newName === oldName) {
                    setEditingMergeName(null);
                    return;
                }
                const updated = birdRecords.map(r => r.locationName === oldName ? { ...r, locationName: newName } : r);
                setRawData(recordsToTSV(updated));

                setMergeHistory(prev => {
                    if (!prev[oldName]) return prev;
                    const next = { ...prev };
                    next[newName] = next[oldName];
                    delete next[oldName];
                    return next;
                });
                setHiddenLocations(prev => prev.map(n => (n === oldName ? newName : n)));
                if (selectedLocation === oldName) setSelectedLocation(newName);
                setEditingMergeName(null);
                setEditingMergeNameDraft('');
                showToast(`Renamed "${oldName}" to "${newName}".`);
            };

            // --- Date range filter ------------------------------------------------------------
            const [dateRangeFilter, setDateRangeFilter] = useState('7D'); // ALL | 24H | 7D | 30D | CUSTOM
            const [customDateFrom, setCustomDateFrom] = useState('');
            const [customDateTo, setCustomDateTo] = useState('');

            const isWithinDateRange = (record) => {
                if (dateRangeFilter === 'ALL') return true;
                const recordDate = parseFlexibleDate(record.lastReported);
                if (isNaN(recordDate)) return true; // don't hide rows with unparseable dates
                if (dateRangeFilter === 'CUSTOM') {
                    if (customDateFrom && recordDate < new Date(customDateFrom)) return false;
                    if (customDateTo && recordDate > new Date(new Date(customDateTo).setHours(23, 59, 59, 999))) return false;
                    return true;
                }
                // "Last Reported" is stored as a calendar date only (no time-of-day — see
                // formatLongDate). A true rolling 24-hour window, at any point in the day, always
                // spans TWO calendar dates (e.g. checked at 9am, "last 24h" covers back to 9am
                // yesterday — touching both today's and yesterday's date). Restricting "Last 24h"
                // to today's date only was stricter than that and could show nothing even with
                // genuinely recent sightings, if the latest one happened to land on yesterday's
                // date. So: "24h" = today + yesterday, "7d"/"30d" = today plus the preceding N-1
                // calendar days — the most correct interpretation this data's precision allows.
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const daysBack = dateRangeFilter === '24H' ? 1 : dateRangeFilter === '7D' ? 6 : 29;
                const cutoff = new Date(startOfToday);
                cutoff.setDate(cutoff.getDate() - daysBack);
                return recordDate >= cutoff;
            };
            
            const [speciesSearchQuery, setSpeciesSearchQuery] = useState('');
            const [hotspotSearchQuery, setHotspotSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL'); 
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL'); // Added bird selection state
            const [selectedRegion, setSelectedRegion] = useState('ALL'); // Filter by eBird region code
            const [sortBy, setSortBy] = useState('bird');
            const [listViewMode, setListViewMode] = useState('species'); // 'sighting' | 'species'
            const [expandedSpecies, setExpandedSpecies] = useState(() => new Set());
            const [toastMsg, setToastMsg] = useState('');

            // Install Prompt Intercept State
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            const [basemapStyle, setBasemapStyle] = useState('dark');
            const [leafletLoaded, setLeafletLoaded] = useState(false);
            const [mapReady, setMapReady] = useState(false);
            const [mapInitError, setMapInitError] = useState('');
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayerGroup = useRef(null);
            const myLocationMarker = useRef(null);

            const [isAddOpen, setIsAddOpen] = useState(false);
            const [newBird, setNewBird] = useState({
                locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: formatLongDate(new Date())
            });

            // Capture install criteria
            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });

                window.addEventListener('appinstalled', () => {
                    setIsInstallable(false);
                    showToast("Birding Console installed on Home Screen!");
                });
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                    setIsInstallable(false);
                }
            };

            const birdRecords = useMemo(() => {
                try {
                    return parseTSV(rawData);
                } catch (e) {
                    return [];
                }
            }, [rawData]);

            // birdRecords enriched with a computed `seen` field (life list match, or manual override),
            // with hidden hotspots excluded so they disappear from stats, map, and the list entirely.
            const enrichedRecords = useMemo(() => {
                try {
                    return birdRecords
                        .filter(r => !hiddenLocations.includes(r.locationName))
                        .map(r => {
                            const overrideKey = `${r.locationName}|${r.bird}`.toLowerCase();
                            const isOverridden = Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey);
                            return { ...r, seen: getSeen(r), isOverridden };
                        });
                } catch (e) {
                    return [];
                }
            }, [birdRecords, lifeListSet, seenOverrides, hiddenLocations]);

            // Everything the stat cards and "Today's Targets" should reflect: search, date
            // range, hotspot, and region filters — but NOT the status tabs (Seen/Unseen/Rare/
            // Priority) themselves, since those tabs ARE these same cards in filter form. Basing
            // the cards on something that already excludes only-what-they-represent means the
            // "Rare species" count doesn't vanish just because you clicked "Unseen", while still
            // correctly narrowing to whatever hotspot/date range/search you've applied.
            const statsScopedRecords = useMemo(() => {
                return enrichedRecords.filter(r => {
                    const matchesSpeciesSearch = !speciesSearchQuery || r.bird.toLowerCase().includes(speciesSearchQuery.toLowerCase());
                    const matchesHotspotSearch = !hotspotSearchQuery ||
                        r.locationName.toLowerCase().includes(hotspotSearchQuery.toLowerCase()) ||
                        r.coordinates.includes(hotspotSearchQuery);
                    const matchesLocation = selectedLocation === 'ALL' || r.locationName === selectedLocation;
                    const matchesBirdSelection = selectedBird === 'ALL' || r.bird === selectedBird;
                    const matchesRegion = selectedRegion === 'ALL' || r.region === selectedRegion;
                    return matchesSpeciesSearch && matchesHotspotSearch && matchesLocation && matchesBirdSelection && matchesRegion && isWithinDateRange(r);
                });
            }, [enrichedRecords, speciesSearchQuery, hotspotSearchQuery, selectedLocation, selectedBird, selectedRegion, dateRangeFilter, customDateFrom, customDateTo]);

            const stats = useMemo(() => {
                const total = statsScopedRecords.length;
                const seenCount = statsScopedRecords.filter(r => r.seen === 'Y').length;
                const rareCount = statsScopedRecords.filter(r => r.rare === 'Y').length;
                const priorityCount = statsScopedRecords.filter(r => r.rare === 'Y' && r.seen === 'N').length;
                const uniqueSpots = new Set(statsScopedRecords.map(r => r.locationName)).size;

                // Today's Targets: unseen rares reported today — the actionable, time-sensitive
                // subset. Uses the same calendar-day comparison as the "Last 24h" date filter
                // (see isWithinDateRange) since "Last Reported" is date-only, no time-of-day.
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const todayTargets = statsScopedRecords.filter(r => {
                    if (r.rare !== 'Y' || r.seen !== 'N') return false;
                    const d = parseFlexibleDate(r.lastReported);
                    return !isNaN(d) && d >= startOfToday;
                });

                return {
                    total, seenCount, unseenCount: total - seenCount,
                    seenPercentage: total > 0 ? Math.round((seenCount / total) * 100) : 0,
                    rareCount, priorityCount, uniqueSpots, todayTargets
                };
            }, [statsScopedRecords]);

            // Visible diagnostics for the date filter — shows the actual counts per bucket and
            // what "today" the app is computing, directly in the UI, rather than requiring dev
            // tools. If "Today" reads 0 here even though you know there's fresh data, the bug is
            // in the underlying dates (or there genuinely isn't any data dated today); if it
            // reads correctly here but the filtered list is still empty, the bug is elsewhere
            // (another active filter, most likely) rather than in date parsing itself.
            const dateDiagnostics = useMemo(() => {
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const yesterday = new Date(startOfToday); yesterday.setDate(yesterday.getDate() - 1);
                const weekAgo = new Date(startOfToday); weekAgo.setDate(weekAgo.getDate() - 6);
                const monthAgo = new Date(startOfToday); monthAgo.setDate(monthAgo.getDate() - 29);
                const counts = { today: 0, last24h: 0, week: 0, month: 0, unparseable: 0, sample: [] };
                enrichedRecords.forEach(r => {
                    const d = parseFlexibleDate(r.lastReported);
                    if (isNaN(d)) { counts.unparseable++; return; }
                    if (d >= startOfToday) counts.today++;
                    if (d >= yesterday) counts.last24h++;
                    if (d >= weekAgo) counts.week++;
                    if (d >= monthAgo) counts.month++;
                    if (counts.sample.length < 3) counts.sample.push(r.lastReported);
                });
                return { ...counts, todayLabel: formatLongDate(now) };
            }, [enrichedRecords]);

            const updateRecord = (id, field, value) => {
                const updated = birdRecords.map(rec => {
                    if (rec.id === id) return { ...rec, [field]: value };
                    return rec;
                });
                setRawData(recordsToTSV(updated));
                showToast("Checklist synced.");
            };

            // Seen is no longer part of the TSV — toggling sets/clears a manual override that
            // persists independently, so it survives future TSV/report re-imports.
            const toggleSeen = (record) => {
                const current = getSeen(record);
                setSeenOverride(record, current === 'Y' ? 'N' : 'Y');
                showToast(current === 'Y' ? "Marked unseen (manual override)." : "Marked seen (manual override).");
            };

            const resetSeenToLifeList = (record) => {
                clearSeenOverride(record);
                showToast("Reverted to life-list status.");
            };

            const toggleRare = (id, currentRare) => {
                updateRecord(id, 'rare', currentRare === 'Y' ? 'N' : 'Y');
            };

            const deleteRecord = (id) => {
                const updated = birdRecords.filter(rec => rec.id !== id);
                setRawData(recordsToTSV(updated));
                showToast("Entry deleted.");
            };

            const filteredRecords = useMemo(() => {
                return statsScopedRecords.filter(r => {
                    if (statusFilter === 'SEEN') return r.seen === 'Y';
                    if (statusFilter === 'UNSEEN') return r.seen === 'N';
                    if (statusFilter === 'RARE') return r.rare === 'Y';
                    if (statusFilter === 'PRIORITY') return r.rare === 'Y' && r.seen === 'N';
                    return true;
                }).sort((a, b) => {
                    if (sortBy === 'location') return a.locationName.localeCompare(b.locationName);
                    if (sortBy === 'bird') return a.bird.localeCompare(b.bird);
                    if (sortBy === 'date') return parseFlexibleDate(b.lastReported) - parseFlexibleDate(a.lastReported);
                    if (sortBy === 'status') return b.seen.localeCompare(a.seen);
                    return 0;
                });
            }, [statsScopedRecords, statusFilter, sortBy]);

            // "By Species" view: groups filteredRecords by species (matching the same normalized
            // name used for life-list comparisons, so a qualified form like "Willet (Eastern)"
            // and a plain "Willet" land in the same group rather than splitting). "Seen" for a
            // group is true if the species is seen ANYWHERE in it — since a life-list match is
            // already species-wide by nature, and a manual override at any one location is a
            // reasonable proxy for "I have personally seen this bird" at the group level too.
            const speciesGroups = useMemo(() => {
                try {
                    const groups = new Map();
                    filteredRecords.forEach(r => {
                        const key = normalizeBirdName(r.bird);
                        if (!groups.has(key)) {
                            groups.set(key, { key, displayName: r.bird, rare: false, seen: false, isOverridden: false, locations: [] });
                        }
                        const g = groups.get(key);
                        // Prefer an unqualified display name (e.g. "Willet" over "Willet (Eastern)")
                        // if we encounter one, since it reads better as the group header.
                        if (g.displayName.includes('(') && !r.bird.includes('(')) g.displayName = r.bird;
                        if (r.rare === 'Y') g.rare = true;
                        if (r.seen === 'Y') g.seen = true;
                        if (r.isOverridden) g.isOverridden = true;
                        g.locations.push(r);
                    });
                    groups.forEach(g => g.locations.sort((a, b) => parseFlexibleDate(b.lastReported) - parseFlexibleDate(a.lastReported)));
                    return Array.from(groups.values()).sort((a, b) => a.displayName.localeCompare(b.displayName));
                } catch (e) {
                    return [];
                }
            }, [filteredRecords]);

            const toggleSpeciesExpanded = (key) => {
                setExpandedSpecies(prev => {
                    const next = new Set(prev);
                    if (next.has(key)) next.delete(key); else next.add(key);
                    return next;
                });
            };

            // Bulk seen toggle/reset across every location a species was reported at, mirroring
            // the per-row toggleSeen/resetSeenToLifeList but applied to a whole group at once.
            const toggleSeenForGroup = (group) => {
                const target = group.seen ? 'N' : 'Y';
                group.locations.forEach(r => setSeenOverride(r, target));
            };
            const resetSeenForGroup = (group) => {
                group.locations.forEach(r => clearSeenOverride(r));
            };

            const mapLocations = useMemo(() => {
                const locMap = {};
                
                filteredRecords.forEach(r => {
                    if (!locMap[r.locationName]) {
                        locMap[r.locationName] = {
                            name: r.locationName, coords: r.coordinates, total: 0, seen: 0, unseenRares: 0, isActive: true, birds: []
                        };
                    }
                    const item = locMap[r.locationName];
                    item.total += 1;
                    if (r.seen === 'Y') item.seen += 1;
                    if (r.rare === 'Y') {
                        item.rares += 1;
                        if (r.seen === 'N') item.unseenRares += 1;
                    }
                    item.birds.push(r);
                });

                enrichedRecords.forEach(r => {
                    if (!locMap[r.locationName]) {
                        locMap[r.locationName] = {
                            name: r.locationName, coords: r.coordinates, total: 0, seen: 0, unseenRares: 0, isActive: false, birds: []
                        };
                    }
                    const item = locMap[r.locationName];
                    if (!item.isActive) {
                        item.total += 1;
                        if (r.seen === 'Y') item.seen += 1;
                        if (r.rare === 'Y') {
                            item.rares += 1;
                            if (r.seen === 'N') item.unseenRares += 1;
                        }
                        item.birds.push(r);
                    }
                });

                return Object.values(locMap).sort((a, b) => {
                    if (a.isActive && !b.isActive) return -1;
                    if (!a.isActive && b.isActive) return 1;
                    return b.unseenRares - a.unseenRares || b.total - a.total;
                });
            }, [filteredRecords, enrichedRecords]);

            // Map Booting Pipeline. Leaflet + the markercluster plugin are both loaded
            // synchronously via <script> tags in <head>, so window.L is guaranteed ready before
            // this inline script runs. The plugin is a second, separate CDN script though, so
            // we don't assume L.markerClusterGroup exists — if it's missing (that script had a
            // hiccup), fall back to a plain L.layerGroup instead of throwing.
            useEffect(() => {
                if (typeof window === 'undefined') return;
                if (!window.L) {
                    setMapInitError('Leaflet failed to load from the CDN — check your internet connection and reload.');
                    return;
                }

                const initMap = () => {
                    if (!mapContainerRef.current || mapInstance.current) return;
                    try {
                        // maxZoom/minZoom must be set here explicitly: tile layers (which would
                        // normally supply them) aren't added until the next effect runs, and
                        // Leaflet throws "Map has no maxZoom specified" if setView/zoom happens
                        // before any zoom bounds exist at all.
                        const map = L.map(mapContainerRef.current, { zoomControl: false, minZoom: 3, maxZoom: 19 }).setView([41.80, -70.30], 10);
                        mapInstance.current = map;

                        if (typeof L.markerClusterGroup === 'function') {
                            markerLayerGroup.current = L.markerClusterGroup({
                                maxClusterRadius: 55,
                                spiderfyOnMaxZoom: true,
                                showCoverageOnHover: false,
                                disableClusteringAtZoom: 15, // markers split apart into individual pins past this zoom
                                iconCreateFunction: (cluster) => {
                                    const children = cluster.getAllChildMarkers();
                                    const hasAmber = children.some(m => m.options.cbcStatus === 'amber');
                                    const hasBlue = !hasAmber && children.some(m => m.options.cbcStatus === 'blue');
                                    const cls = hasAmber ? 'cbc-cluster-amber' : hasBlue ? 'cbc-cluster-blue' : 'cbc-cluster-green';
                                    const count = cluster.getChildCount();
                                    const size = Math.min(56, Math.max(32, 24 + Math.sqrt(count) * 6));
                                    return L.divIcon({
                                        html: `<div class="cbc-cluster-icon ${cls}" style="width:${size}px;height:${size}px;">${count}</div>`,
                                        className: '',
                                        iconSize: L.point(size, size)
                                    });
                                }
                            }).addTo(map);
                        } else {
                            console.warn('Leaflet.markercluster failed to load — showing markers without clustering.');
                            markerLayerGroup.current = L.layerGroup().addTo(map);
                        }

                        L.control.zoom({ position: 'topright' }).addTo(map);
                        setLeafletLoaded(true);
                        setMapReady(true);
                        setMapInitError('');

                        // Leaflet measures its container's pixel size once at init time. The
                        // Tailwind CDN build injects its generated stylesheet asynchronously
                        // (after this script has already run), so on first paint the container
                        // can still be 0×0 when Leaflet grabs its size — producing a permanently
                        // blank map even though the div visibly has a size a moment later. Force
                        // Leaflet to re-measure shortly after mount, and again whenever the
                        // container itself resizes (panel toggles, window resize, etc).
                        requestAnimationFrame(() => map.invalidateSize());
                        setTimeout(() => map.invalidateSize(), 300);
                        setTimeout(() => map.invalidateSize(), 1000);

                        if (typeof ResizeObserver !== 'undefined') {
                            const resizeObserver = new ResizeObserver(() => map.invalidateSize());
                            resizeObserver.observe(mapContainerRef.current);
                            mapInstance.current._cbcResizeObserver = resizeObserver;
                        }
                    } catch (err) {
                        console.error('Map initialization failed:', err);
                        setMapInitError(err && err.message ? err.message : String(err));
                        setMapReady(false);
                    }
                };

                initMap();

                return () => {
                    if (mapInstance.current) {
                        if (mapInstance.current._cbcResizeObserver) {
                            mapInstance.current._cbcResizeObserver.disconnect();
                        }
                        mapInstance.current.remove();
                        mapInstance.current = null;
                        myLocationMarker.current = null;
                        setMapReady(false);
                    }
                };
            }, []);

            useEffect(() => {
                if (!mapInstance.current || !mapReady) return;
                const map = mapInstance.current;

                map.eachLayer(layer => {
                    if (layer instanceof L.TileLayer) map.removeLayer(layer);
                });

                let tileUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                let att = '© CARTO';

                if (basemapStyle === 'streets') {
                    tileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
                    att = '© OSM';
                } else if (basemapStyle === 'satellite') {
                    tileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
                    att = 'Esri';
                }

                L.tileLayer(tileUrl, { attribution: att }).addTo(map);
            }, [basemapStyle, mapReady]);

            // Draw markers instantly on launch
            useEffect(() => {
                if (!mapInstance.current || !markerLayerGroup.current || !mapReady) return;
                const group = markerLayerGroup.current;
                group.clearLayers();
                const bounds = [];

                mapLocations.forEach(loc => {
                    if (!loc.coords) return;
                    const parts = loc.coords.split(',');
                    const lat = parseFloat(parts[0]);
                    const lng = parseFloat(parts[1]);
                    if (isNaN(lat) || isNaN(lng)) return;

                    const isFocused = selectedLocation === loc.name;
                    // Amber = unseen rare target here, sky blue = partially seen, emerald = fully
                    // seen. Blue/green were previously too close (teal vs emerald) — swapped the
                    // "partial" state to blue for a clearly distinct hue against both neighbors.
                    const status = loc.unseenRares > 0 ? 'amber' : (loc.seen === loc.total ? 'green' : 'blue');
                    const markerColor = status === 'amber' ? '#f59e0b' : status === 'green' ? '#10b981' : '#38bdf8';
                    // Diameter scales with species count at the hotspot (more birds recorded = bigger dot),
                    // clamped to a sensible range so a handful of species and a hundred both read clearly.
                    const baseSize = Math.max(14, Math.min(42, 14 + Math.sqrt(loc.total) * 4));
                    const size = isFocused ? baseSize + 10 : baseSize;
                    const opacity = loc.isActive ? 0.92 : 0.32;
                    const ring = isFocused ? '3px solid #ffffff' : '1.5px solid #020617';

                    const marker = L.marker([lat, lng], {
                        cbcStatus: status,
                        icon: L.divIcon({
                            className: '',
                            html: `<div style="width:${size}px;height:${size}px;border-radius:9999px;background:${markerColor};opacity:${opacity};border:${ring};box-sizing:border-box;"></div>`,
                            iconSize: [size, size],
                            iconAnchor: [size / 2, size / 2]
                        })
                    });

                    marker.bindPopup(`
                        <div class="text-xs">
                            <h4 class="font-bold text-teal-400">📍 ${loc.name}</h4>
                            <div class="mt-1">Seen Progress: <strong>${loc.seen} / ${loc.total}</strong></div>
                            ${loc.unseenRares > 0 ? `<div class="mt-1 text-amber-400">⚠️ ${loc.unseenRares} unseen rare target(s)</div>` : ''}
                        </div>
                    `);

                    marker.on('click', () => setSelectedLocation(loc.name));
                    marker.addTo(group);

                    if (loc.isActive) bounds.push([lat, lng]);
                });

                if (selectedLocation === 'ALL' && bounds.length > 0) {
                    mapInstance.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
                } else if (selectedLocation !== 'ALL') {
                    const target = mapLocations.find(l => l.name === selectedLocation);
                    if (target && target.coords) {
                        const parts = target.coords.split(',');
                        mapInstance.current.setView([parseFloat(parts[0]), parseFloat(parts[1])], 13);
                    }
                }
            }, [mapLocations, selectedLocation, mapReady]);

            const handleMetricClick = (filterType) => {
                setStatusFilter(prev => prev === filterType ? 'ALL' : filterType);
            };

            // Jumps straight to "what should I chase today" — unseen rares from the last 24h —
            // by combining the existing Priority status filter with the existing 24h date filter,
            // and clearing anything else that might be hiding results (search text, a single
            // hotspot/region/species focus).
            const viewTodaysTargets = () => {
                setStatusFilter('PRIORITY');
                setDateRangeFilter('24H');
                setSpeciesSearchQuery('');
                setHotspotSearchQuery('');
                setSelectedLocation('ALL');
                setSelectedBird('ALL');
                setSelectedRegion('ALL');
                showToast(`Showing ${stats.todayTargets.length} unseen rare target(s) from the last 24h.`);
            };

            const handleAddSubmit = (e) => {
                e.preventDefault();
                const updated = [...birdRecords, { ...newBird, id: `custom-${Date.now()}` }];
                setRawData(recordsToTSV(updated));
                setIsAddOpen(false);
                setNewBird({ locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: formatLongDate(new Date()) });
                showToast("Added target successfully!");
            };

            // Geolocation Sensor Handler
            const handleGetLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude.toFixed(7);
                            const lng = position.coords.longitude.toFixed(7);
                            setNewBird(prev => ({ ...prev, coordinates: `${lat}, ${lng}` }));
                            showToast("Coordinates captured!");
                        },
                        (error) => {
                            showToast("Failed to fetch coordinates. Check sensor permissions.");
                        }
                    );
                } else {
                    showToast("Sensor tracking not supported by this device.");
                }
            };

            // "Find Me" — centers the map on the device's current location and drops/updates a
            // pin for it, distinct from the hotspot markers (used for orientation, not sightings).
            const [locating, setLocating] = useState(false);
            const handleFindMe = () => {
                if (!navigator.geolocation) {
                    showToast("Geolocation not supported by this device.");
                    return;
                }
                if (!mapInstance.current) return;
                setLocating(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        setLocating(false);
                        mapInstance.current.setView([latitude, longitude], 14);
                        if (myLocationMarker.current) {
                            myLocationMarker.current.setLatLng([latitude, longitude]);
                        } else {
                            myLocationMarker.current = L.marker([latitude, longitude], {
                                icon: L.divIcon({
                                    className: '',
                                    html: `<div style="width:16px;height:16px;border-radius:9999px;background:#38bdf8;border:3px solid #ffffff;box-shadow:0 0 0 5px rgba(56,189,248,0.35);"></div>`,
                                    iconSize: [16, 16],
                                    iconAnchor: [8, 8]
                                }),
                                zIndexOffset: 1000
                            }).addTo(mapInstance.current);
                            myLocationMarker.current.bindPopup('📍 You are here');
                        }
                        showToast("Found your location.");
                    },
                    (error) => {
                        setLocating(false);
                        showToast("Couldn't get your location — check location permissions.");
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            // "Home" — resets the map view to fit whichever region is currently selected (or
            // every hotspot, if "All Regions" is selected). Deliberately computed from
            // enrichedRecords + selectedRegion directly rather than the filtered/mapLocations
            // pipeline: that pipeline also folds in search text, status tab, date range, and a
            // single-hotspot focus, which made "Home" zoom to whatever narrow slice happened to
            // be on screen instead of the region as a whole — and reading it in the same tick as
            // resetting selectedLocation would've used a stale value anyway, since state updates
            // aren't applied synchronously.
            const handleGoHome = () => {
                if (!mapInstance.current) return;
                setSelectedLocation('ALL');
                const regionRecords = selectedRegion === 'ALL'
                    ? enrichedRecords
                    : enrichedRecords.filter(r => r.region === selectedRegion);
                const coords = regionRecords
                    .map(r => r.coordinates)
                    .filter(Boolean)
                    .map(c => c.split(',').map(parseFloat))
                    .filter(([lat, lng]) => !isNaN(lat) && !isNaN(lng));
                if (coords.length > 0) {
                    mapInstance.current.fitBounds(coords, { padding: [40, 40], maxZoom: 13 });
                } else {
                    mapInstance.current.setView([41.80, -70.30], 10);
                }
            };

            // --- Export: current filtered list as a downloadable CSV -------------------------
            const handleExportCSV = () => {
                if (filteredRecords.length === 0) {
                    showToast("Nothing to export — adjust filters first.");
                    return;
                }
                const escapeCsv = (val) => {
                    const s = String(val ?? '');
                    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
                };
                const header = ['Location Name', 'Coordinates', 'Bird', 'Rare (Y/N)', 'Last Reported', 'Seen (Y/N)', 'Region', 'Checklist URL'];
                const rows = filteredRecords.map(r => [
                    r.locationName, r.coordinates, r.bird, r.rare, r.lastReported, r.seen,
                    r.region || '',
                    r.checklistId ? `https://ebird.org/checklist/${r.checklistId}` : ''
                ].map(escapeCsv).join(','));
                const csv = [header.join(','), ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                const stamp = new Date().toISOString().slice(0, 10);
                a.href = url;
                a.download = `birding-console-${stamp}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(`Exported ${filteredRecords.length} record(s).`);
            };

            // --- Import: eBird life list CSV -------------------------------------------------
            // --- eBird API: species code taxonomy sync ---------------------------------------
            // Downloads eBird's official species taxonomy once (comName -> speciesCode for
            // every species) so every "eBird ↗" link points at the correct species page,
            // including birds added later that were never hand-mapped. Taxonomy only changes
            // once a year (each August), so this is skipped if synced within the last 30 days.
            const fetchTaxonomyMap = async (key) => {
                const res = await fetch('https://api.ebird.org/v2/ref/taxonomy/ebird?fmt=json&cat=species&locale=en', {
                    headers: { 'x-ebirdapitoken': key }
                });
                if (!res.ok) throw new Error(`Taxonomy sync failed (HTTP ${res.status})`);
                const data = await res.json();
                const map = {};
                data.forEach(t => {
                    if (t.comName && t.speciesCode) map[normalizeBirdName(t.comName)] = t.speciesCode;
                });
                return map;
            };

            // --- eBird API: daily region sightings (recent + notable/rare) -------------------
            // Pulls both feeds for a single region code and returns them in the shape
            // mergeReportEntries expects, tagged with `region` so the app can filter by it later.
            // Notable/rare results are tagged rare='Y'; everything else rare='N'
            // (mergeReportEntries keeps 'Y' if a bird was already flagged rare from an earlier import).
            const fetchRegionSightings = async (key, regionCode) => {
                const headers = { 'x-ebirdapitoken': key };
                const [recentRes, notableRes] = await Promise.all([
                    fetch(`https://api.ebird.org/v2/data/obs/${regionCode}/recent?back=14&fmt=json`, { headers }),
                    fetch(`https://api.ebird.org/v2/data/obs/${regionCode}/recent/notable?back=30&fmt=json`, { headers })
                ]);
                if (!recentRes.ok) throw new Error(`Recent sightings fetch failed for ${regionCode} (HTTP ${recentRes.status})`);
                if (!notableRes.ok) throw new Error(`Notable sightings fetch failed for ${regionCode} (HTTP ${notableRes.status})`);
                const [recent, notable] = await Promise.all([recentRes.json(), notableRes.json()]);

                const notableKeys = new Set(notable.map(o => `${o.locId}|${o.speciesCode}`));
                const toEntry = (o) => ({
                    locationName: o.locName || 'Unknown Location',
                    coordinates: (o.lat != null && o.lng != null) ? `${o.lat}, ${o.lng}` : '',
                    bird: o.comName,
                    rare: notableKeys.has(`${o.locId}|${o.speciesCode}`) ? 'Y' : 'N',
                    lastReported: formatLongDate(parseFlexibleDate(o.obsDt)),
                    region: regionCode,
                    checklistId: o.subId || ''
                });
                return [...recent, ...notable].filter(o => o.comName && o.locName).map(toEntry);
            };

            // Runs a full sync: taxonomy (if stale/empty) + today's sightings for every configured
            // region, merged into the existing dataset. Called on load once a day automatically,
            // and any time from the "Sync Now" button in Settings.
            const runEbirdSync = async ({ silent = false } = {}) => {
                if (!ebirdApiKey) {
                    if (!silent) showToast("Add your eBird API key in Settings first.");
                    return;
                }
                if (ebirdRegions.length === 0) {
                    if (!silent) showToast("Add at least one region code in Settings first.");
                    return;
                }
                setIsSyncing(true);
                setSyncError('');
                try {
                    const taxonomyStale = !taxonomySyncedAt || (Date.now() - taxonomySyncedAt > 30 * 24 * 60 * 60 * 1000) || Object.keys(taxonomyMap).length === 0;
                    if (taxonomyStale) {
                        const map = await fetchTaxonomyMap(ebirdApiKey);
                        setTaxonomyMap(map);
                        setTaxonomySyncedAt(Date.now());
                    }
                    // Regions are fetched sequentially (not Promise.all) to stay well within eBird's
                    // rate limits when several regions are configured.
                    let allEntries = [];
                    for (const regionCode of ebirdRegions) {
                        const entries = await fetchRegionSightings(ebirdApiKey, regionCode);
                        allEntries = allEntries.concat(entries);
                    }
                    mergeReportEntries(allEntries, { silent: true });
                    setEbirdSyncedAt(Date.now());
                    if (!silent) showToast(`Synced with eBird — ${allEntries.length} sightings checked across ${ebirdRegions.length} region(s).`);
                } catch (err) {
                    const msg = err && err.message ? err.message : 'Sync failed';
                    setSyncError(msg);
                    if (!silent) showToast(`eBird sync failed: ${msg}`);
                } finally {
                    setIsSyncing(false);
                }
            };

            const addRegion = () => {
                const code = newRegionInput.trim().toUpperCase();
                if (!code) return;
                if (ebirdRegions.includes(code)) {
                    showToast(`${code} is already in your region list.`);
                    return;
                }
                setEbirdRegions(prev => [...prev, code]);
                setNewRegionInput('');
            };

            const removeRegion = (code) => {
                const affected = birdRecords.filter(r => r.region === code);
                const proceed = affected.length === 0
                    ? true
                    : confirm(`Remove region ${code}? This will also delete ${affected.length} sighting record(s) tagged with it (across ${new Set(affected.map(r => r.locationName)).size} hotspot(s)).`);
                if (!proceed) return;

                setEbirdRegions(prev => prev.filter(r => r !== code));
                if (affected.length > 0) {
                    const updated = birdRecords.filter(r => r.region !== code);
                    setRawData(recordsToTSV(updated));
                }
                showToast(`Removed region ${code}${affected.length > 0 ? ` and ${affected.length} record(s)` : ''}.`);
            };

            // Auto-sync once per day on load, if a key is present.
            useEffect(() => {
                if (ebirdApiKey && (!ebirdSyncedAt || Date.now() - ebirdSyncedAt > 24 * 60 * 60 * 1000)) {
                    runEbirdSync({ silent: true });
                }
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            const handleLifeListFile = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = ''; // allow re-selecting the same file later
                if (!file) return;
                try {
                    const text = await file.text();
                    const names = parseLifeListCSV(text);
                    if (names.length === 0) {
                        showToast("Couldn't find a 'Common Name' column in that CSV.");
                        return;
                    }
                    const label = newLifeListLabel.trim() || file.name.replace(/\.csv$/i, '') || 'Life List';
                    const id = `${label.toLowerCase().replace(/[^a-z0-9]+/g, '-')}-${Date.now()}`;
                    setSavedLifeLists(prev => ({ ...prev, [id]: { label, names } }));
                    setActiveLifeListId(id);
                    setNewLifeListLabel('');
                    showToast(`"${label}" loaded — ${names.length} species — and set as active.`);
                } catch (err) {
                    showToast("Failed to read that life list file.");
                }
            };

            const deleteLifeList = (id) => {
                const list = savedLifeLists[id];
                setSavedLifeLists(prev => {
                    const next = { ...prev };
                    delete next[id];
                    return next;
                });
                if (activeLifeListId === id) {
                    const remaining = Object.keys(savedLifeLists).filter(k => k !== id);
                    if (remaining.length > 0) {
                        setActiveLifeListId(remaining[0]);
                    } else {
                        // Deleted the last list — recreate a default one so there's always
                        // something to compare against, rather than leaving nothing active.
                        setSavedLifeLists({ default: { label: 'My Life List', names: DEFAULT_LIFE_LIST } });
                        setActiveLifeListId('default');
                    }
                }
                showToast(`Deleted "${list?.label || id}".`);
            };

            const [editingListId, setEditingListId] = useState(null);
            const [editingLabelDraft, setEditingLabelDraft] = useState('');

            const startRenameLifeList = (id, currentLabel) => {
                setEditingListId(id);
                setEditingLabelDraft(currentLabel);
            };

            const saveRenameLifeList = () => {
                const trimmed = editingLabelDraft.trim();
                if (trimmed && editingListId) {
                    setSavedLifeLists(prev => ({
                        ...prev,
                        [editingListId]: { ...prev[editingListId], label: trimmed }
                    }));
                }
                setEditingListId(null);
                setEditingLabelDraft('');
            };

            // --- Import: sighting report (.docx rare-alert export, or plain .txt/.tsv) -------
            // Merges new/updated sightings into the existing dataset rather than replacing it,
            // so hotspots and species not present in the uploaded report are kept, and manual
            // seen overrides (keyed by location+bird) are untouched.
            const mergeReportEntries = (entries, { silent = false } = {}) => {
                // Hidden hotspots stay excluded from future merges too, so a daily eBird sync
                // (or re-uploading the same report) doesn't silently bring them back.
                entries = entries.filter(e => !hiddenLocations.includes(e.locationName));
                const noNewEntries = entries.length === 0;
                const byKey = new Map(birdRecords.map(r => [`${r.locationName}|${r.bird}`.toLowerCase(), r]));
                let added = 0, updated = 0;
                entries.forEach(entry => {
                    const key = `${entry.locationName}|${entry.bird}`.toLowerCase();
                    const existing = byKey.get(key);
                    if (existing) {
                        const newer = parseFlexibleDate(entry.lastReported) >= parseFlexibleDate(existing.lastReported);
                        byKey.set(key, {
                            ...existing,
                            coordinates: existing.coordinates || entry.coordinates,
                            rare: existing.rare === 'Y' || entry.rare === 'Y' ? 'Y' : 'N',
                            lastReported: newer ? entry.lastReported : existing.lastReported,
                            region: existing.region || entry.region || '',
                            // Checklist link should point at whichever report the winning date
                            // came from, not be stuck on the original one forever.
                            checklistId: newer ? (entry.checklistId || existing.checklistId || '') : (existing.checklistId || entry.checklistId || '')
                        });
                        updated++;
                    } else {
                        byKey.set(key, {
                            id: `${entry.locationName}-${entry.bird}-${Date.now()}-${added}`,
                            locationName: entry.locationName,
                            coordinates: entry.coordinates,
                            bird: entry.bird,
                            rare: entry.rare,
                            lastReported: entry.lastReported,
                            region: entry.region || '',
                            checklistId: entry.checklistId || ''
                        });
                        added++;
                    }
                });
                let merged = Array.from(byKey.values()).sort((a, b) => a.locationName.localeCompare(b.locationName));

                // Purge anything over a month old on every update, so the dataset doesn't grow
                // unbounded with sightings nobody's chasing anymore. Runs against the WHOLE
                // dataset (not just this merge's entries), so old records left over from earlier
                // syncs get cleared out too, not just newly-added ones. Records with an
                // unparseable/missing date are kept rather than guessed at and deleted.
                const monthAgo = new Date();
                monthAgo.setHours(0, 0, 0, 0);
                monthAgo.setDate(monthAgo.getDate() - 30);
                const beforePurge = merged.length;
                merged = merged.filter(r => {
                    const d = parseFlexibleDate(r.lastReported);
                    return isNaN(d) || d >= monthAgo;
                });
                const purged = beforePurge - merged.length;

                setRawData(recordsToTSV(merged));
                if (!silent) {
                    showToast(`Report merged — ${added} new, ${updated} updated${purged > 0 ? `, ${purged} purged (30+ days old)` : ''}. Seen status recalculated from your life list.`);
                }
                return { added, updated, purged };
            };

            const handleReportFile = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = '';
                if (!file) return;
                try {
                    let text;
                    if (file.name.toLowerCase().endsWith('.docx')) {
                        if (!window.mammoth) {
                            showToast("Docx reader failed to load — check your connection and try again.");
                            return;
                        }
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await window.mammoth.extractRawText({ arrayBuffer });
                        text = result.value;
                    } else {
                        text = await file.text();
                    }
                    const entries = parseAlertReport(text);
                    mergeReportEntries(entries);
                } catch (err) {
                    showToast("Failed to read that report file.");
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 px-4 py-3 md:px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-tr from-teal-500 to-emerald-400 p-2.5 rounded-xl text-slate-950">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">BIRDING CONSOLE</h1>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Interactive Bird Sighting Portal</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 items-center">
                                {isInstallable && (
                                    <button 
                                        onClick={handleInstallApp}
                                        className="bg-emerald-500 text-slate-950 font-black px-3.5 py-2 rounded-xl text-xs hover:bg-emerald-400 transition flex items-center gap-1.5 shadow-lg shadow-emerald-500/20"
                                    >
                                        <span>📲</span> Install App
                                    </button>
                                )}
                                <button
                                    onClick={viewTodaysTargets}
                                    className={`font-black px-3.5 py-2 rounded-xl text-xs shadow-lg transition flex items-center gap-1.5 ${stats.todayTargets.length > 0 ? 'bg-rose-500 text-white hover:bg-rose-400 shadow-rose-500/30' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700'}`}
                                    title="Unseen rare birds reported in the last 24 hours"
                                >
                                    <span>🔥</span> Today's Targets{stats.todayTargets.length > 0 ? ` (${stats.todayTargets.length})` : ''}
                                </button>
                                <button onClick={() => setIsAddOpen(true)} className="bg-teal-500 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs shadow-lg hover:bg-teal-400 transition">+ Sighting</button>
                                <button onClick={() => { setPastedData(rawData); setShowSyncPanel(!showSyncPanel); }} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition">Sync TSV</button>
                                <button onClick={() => setShowImportPanel(!showImportPanel)} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition">Import</button>
                                <button onClick={() => setShowSettingsPanel(!showSettingsPanel)} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition relative">
                                    Settings
                                    {isSyncing && <span className="absolute -top-1 -right-1 w-2 h-2 bg-teal-400 rounded-full animate-ping" />}
                                </button>
                                <input ref={lifeListFileRef} type="file" accept=".csv" onChange={handleLifeListFile} className="hidden" />
                                <input ref={reportFileRef} type="file" accept=".docx,.txt,.tsv" onChange={handleReportFile} className="hidden" />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-6 md:px-8 flex-1 w-full space-y-6">
                        {showSettingsPanel && (
                            <div className="bg-slate-900 border border-teal-500/30 rounded-2xl p-5 space-y-4 shadow-xl">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-sm font-bold text-teal-400">eBird API Settings</h3>
                                    <button onClick={() => setShowSettingsPanel(false)} className="text-slate-400 text-xs px-2 hover:text-white">Close</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">eBird API Key</label>
                                        <input
                                            type="text"
                                            value={ebirdApiKey}
                                            onChange={(e) => setEbirdApiKey(e.target.value.trim())}
                                            placeholder="e.g. l531bs6l4t92"
                                            className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none"
                                        />
                                        <p className="text-[9px] text-slate-500">Used for accurate eBird species links and daily sighting sync. Get a free key at ebird.org/api/keygen. Stored only on this device.</p>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">eBird Regions ({ebirdRegions.length})</label>
