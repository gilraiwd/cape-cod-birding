        function getEBirdUrl(birdName) {
            const cleanName = birdName.trim();
            const code = EBIRD_CODE_MAP[cleanName];
            if (code) {
                return `https://ebird.org/species/${code}`;
            }
            return `https://ebird.org/search?q=${encodeURIComponent(cleanName)}`;
        }

        function parseTSV(text) {
            const lines = text.trim().split('\n');
            const result = [];
            let currentLoc = "";
            let currentCoords = "";

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (i === 0 && line.toLowerCase().includes('location name')) continue; 
                const cols = line.split('\t');
                if (cols.length < 3) continue;

                let loc = cols[0].trim();
                let coords = cols[1].trim();
                const bird = cols[2].trim();
                const rare = cols[3]?.trim() || "N";
                const date = cols[4]?.trim() || "";

                if (loc !== "") {
                    currentLoc = loc;
                    currentCoords = coords;
                }

                result.push({
                    id: `${currentLoc}-${bird}-${i}`,
                    locationName: currentLoc,
                    coordinates: currentCoords,
                    bird: bird,
                    rare: rare,
                    lastReported: date
                });
            }
            return result;
        }

        function recordsToTSV(records) {
            const header = "Location Name\tCoordinates\tBird\tRare (Y/N)\tLast Reported";
            let lastLoc = "";
            let lastCoords = "";
            const rows = records.map(r => {
                let locCol = "";
                let coordCol = "";
                if (r.locationName !== lastLoc || r.coordinates !== lastCoords) {
                    locCol = r.locationName;
                    coordCol = r.coordinates;
                    lastLoc = r.locationName;
                    lastCoords = r.coordinates;
                }
                return `${locCol}\t${coordCol}\t${r.bird}\t${r.rare}\t${r.lastReported}`;
            });
            return [header, ...rows].join('\n');
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"' || char === "'") {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim().replace(/^["']|["']$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim().replace(/^["']|["']$/g, ''));
            return result;
        }

        function App() {
            const [rawData, setRawData] = useState(INITIAL_RAW_DATA);
            const [pastedData, setPastedData] = useState('');
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            
            // Life List state
            const [lifeListSet, setLifeListSpecies] = useState(new Set());
            const [lifeListFileName, setLifeListFileName] = useState('');
            const [manualSeenStates, setManualSeenStates] = useState({});

            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL'); 
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL');
            const [sortBy, setSortBy] = useState('bird');
            const [toastMsg, setToastMsg] = useState('');

            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            const [basemapStyle, setBasemapStyle] = useState('dark');
            const [mapReady, setMapReady] = useState(false);
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayerGroup = useRef(null);

            const [isAddOpen, setIsAddOpen] = useState(false);
            const [newBird, setNewBird] = useState({
                locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: 'Thursday, July 9, 2026'
            });

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') setDeferredPrompt(null);
            };

            const birdRecords = useMemo(() => {
                try {
                    const rawRecords = parseTSV(rawData);
                    return rawRecords.map(r => {
                        const isSeen = lifeListSet.has(r.bird.toLowerCase()) || !!manualSeenStates[r.bird.toLowerCase()];
                        return { ...r, seen: isSeen ? 'Y' : 'N' };
                    });
                } catch (e) { return []; }
            }, [rawData, lifeListSet, manualSeenStates]);

            const stats = useMemo(() => {
                const total = birdRecords.length;
                const seenCount = birdRecords.filter(r => r.seen === 'Y').length;
                const rareCount = birdRecords.filter(r => r.rare === 'Y').length;
                const priorityCount = birdRecords.filter(r => r.rare === 'Y' && r.seen === 'N').length;
                return { total, seenCount, unseenCount: total - seenCount, seenPercentage: total > 0 ? Math.round((seenCount / total) * 100) : 0, rareCount, priorityCount };
            }, [birdRecords]);

            const toggleSeen = (birdName) => {
                const key = birdName.toLowerCase();
                const isCurrentlySeen = lifeListSet.has(key) || !!manualSeenStates[key];
                setManualSeenStates(prev => ({ ...prev, [key]: !isCurrentlySeen }));
                showToast(`${birdName} seen status updated.`);
            };

            const deleteRecord = (id) => {
                const updated = birdRecords.filter(rec => rec.id !== id);
                setRawData(recordsToTSV(updated));
                showToast("Entry deleted.");
            };

            const filteredRecords = useMemo(() => {
                return birdRecords.filter(r => {
                    const matchesSearch = r.bird.toLowerCase().includes(searchQuery.toLowerCase()) || r.locationName.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesLocation = selectedLocation === 'ALL' || r.locationName === selectedLocation;
                    const matchesBirdSelection = selectedBird === 'ALL' || r.bird === selectedBird;

                    if (!matchesSearch || !matchesLocation || !matchesBirdSelection) return false;

                    if (statusFilter === 'SEEN') return r.seen === 'Y';
                    if (statusFilter === 'UNSEEN') return r.seen === 'N';
                    if (statusFilter === 'RARE') return r.rare === 'Y';
                    if (statusFilter === 'PRIORITY') return r.rare === 'Y' && r.seen === 'N';
                    return true;
                });
            }, [birdRecords, searchQuery, statusFilter, selectedLocation, selectedBird, sortBy]);

            const mapLocations = useMemo(() => {
                const locMap = {};
                filteredRecords.forEach(r => {
                    if (!locMap[r.locationName]) locMap[r.locationName] = { name: r.locationName, coords: r.coordinates, total: 0, seen: 0, unseenRares: 0, isActive: true };
                    const item = locMap[r.locationName];
                    item.total += 1;
                    if (r.seen === 'Y') item.seen += 1;
                    if (r.rare === 'Y' && r.seen === 'N') item.unseenRares += 1;
                });
                return Object.values(locMap);
            }, [filteredRecords]);

            // Map init
            useEffect(() => {
                if (!mapContainerRef.current || mapInstance.current) return;
                const map = L.map(mapContainerRef.current, { zoomControl: false }).setView([41.80, -70.30], 10);
                mapInstance.current = map;
                markerLayerGroup.current = L.layerGroup().addTo(map);
                L.control.zoom({ position: 'topright' }).addTo(map);
                setMapReady(true);
            }, []);

            // Basemap style handler
            useEffect(() => {
                if (!mapInstance.current || !mapReady) return;
                mapInstance.current.eachLayer(l => { if (l instanceof L.TileLayer) mapInstance.current.removeLayer(l); });
                let url = basemapStyle === 'streets' ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' : basemapStyle === 'satellite' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                L.tileLayer(url).addTo(mapInstance.current);
            }, [basemapStyle, mapReady]);

            // Marker rendering
            useEffect(() => {
                if (!mapInstance.current || !markerLayerGroup.current || !mapReady) return;
                markerLayerGroup.current.clearLayers();
                mapLocations.forEach(loc => {
                    if (!loc.coords) return;
                    const [lat, lng] = loc.coords.split(',').map(Number);
                    const marker = L.circleMarker([lat, lng], { radius: 8, fillColor: loc.unseenRares > 0 ? '#f59e0b' : '#10b981', fillOpacity: 0.8, color: '#fff', weight: 1 }).addTo(markerLayerGroup.current);
                    marker.bindPopup(`<h4 class="font-bold">${loc.name}</h4><p>${loc.seen}/${loc.total} seen</p>`).on('click', () => setSelectedLocation(loc.name));
                });
            }, [mapLocations, mapReady]);

            return (
                <div className="flex flex-col min-h-screen bg-slate-950 text-slate-100">
                    <header className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 sticky top-0 z-50">
                        <div>
                            <h1 className="text-lg font-black text-teal-400">CAPE COD BIRD SIGHTINGS</h1>
                            <p className="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Interactive Cape Code Bird Sighting Portal</p>
                        </div>
                        <div className="flex gap-2">
                             {isInstallable && <button onClick={handleInstallApp} className="bg-emerald-500 text-slate-950 px-3 py-1.5 rounded-lg text-xs font-bold">Install</button>}
                            <button onClick={() => setIsAddOpen(true)} className="bg-teal-500 text-slate-950 px-3 py-1.5 rounded-lg text-xs font-bold">+</button>
                        </div>
                    </header>

                    <main className="p-4 space-y-6">
                        <section className="bg-slate-900 rounded-2xl h-64 overflow-hidden shadow-inner border border-slate-800 relative">
                            <div ref={mapContainerRef} className="w-full h-full" />
                        </section>

                        <div className="bg-slate-900 p-4 rounded-2xl space-y-4">
                            <input type="text" placeholder="Search..." onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm" />
                            <div className="flex gap-2 overflow-x-auto pb-2">
                                {['ALL', 'SEEN', 'UNSEEN', 'RARE', 'PRIORITY'].map(f => (
                                    <button key={f} onClick={() => setStatusFilter(f)} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${statusFilter === f ? 'bg-teal-500 text-slate-950' : 'bg-slate-800'}`}>{f}</button>
                                ))}
                            </div>
                        </div>

                        {filteredRecords.map(r => (
                            <div key={r.id} onClick={() => setSelectedBird(r.bird === selectedBird ? 'ALL' : r.bird)} className={`p-4 rounded-xl border ${selectedBird === r.bird ? 'border-teal-500' : 'border-slate-800'} flex justify-between items-center`}>
                                <div className="flex items-center gap-3">
                                    <BirdThumbnail birdName={r.bird} />
                                    <div>
                                        <div className="font-bold">{r.bird}</div>
                                        <div className="text-xs text-slate-400">{r.locationName}</div>
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <a href={getEBirdUrl(r.bird)} target="_blank" className="bg-slate-800 px-3 py-1 rounded-lg text-xs font-bold">eBird ↗</a>
                                    <button onClick={(e) => { e.stopPropagation(); toggleSeen(r.bird); }} className={`px-3 py-1 rounded-lg text-xs font-bold ${r.seen === 'Y' ? 'bg-teal-500/20 text-teal-300' : 'bg-slate-800'}`}>
                                        {r.seen === 'Y' ? '✓ Seen' : 'Mark'}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        function BirdThumbnail({ birdName }) {
            const [imgUrl, setImgUrl] = useState(null);
            useEffect(() => {
                fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(birdName)}`)
                    .then(r => r.json())
                    .then(data => { if(data.thumbnail) setImgUrl(data.thumbnail.source); })
                    .catch(() => {});
            }, [birdName]);
            return imgUrl ? <img src={imgUrl} className="w-12 h-12 rounded-lg object-cover" /> : <div className="w-12 h-12 bg-slate-800 rounded-lg" />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
