        // Resolves a bird's eBird species page URL. Prefers the live taxonomy map (synced
        // from eBird's official /ref/taxonomy/ebird endpoint — see Settings), falls back to
        // the small static map above, and only falls back to a plain search link if neither
        // has a match (e.g. taxonomy hasn't been synced yet, or the name doesn't resolve).
        function getEBirdUrl(birdName, taxonomyMap) {
            const cleanName = birdName.trim();
            const normalized = normalizeBirdName(cleanName);
            const liveCode = taxonomyMap && (taxonomyMap[normalized] || taxonomyMap[cleanName.toLowerCase()]);
            if (liveCode) {
                return `https://ebird.org/species/${liveCode}`;
            }
            const staticCode = STATIC_EBIRD_CODE_MAP[cleanName];
            if (staticCode) {
                return `https://ebird.org/species/${staticCode}`;
            }
            return `https://ebird.org/search?q=${encodeURIComponent(cleanName)}`;
        }

        // Safe localStorage helpers (no-ops if storage is unavailable, e.g. private browsing)
            const storageGet = (key, fallback) => {
                try {
                    const raw = window.localStorage.getItem(key);
                    return raw !== null ? JSON.parse(raw) : fallback;
                } catch (e) { return fallback; }
            };
            const storageSet = (key, value) => {
                try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
            };

        function App() {
            const [rawData, setRawData] = useState(() => storageGet('cbc_rawData', INITIAL_RAW_DATA));
            const [pastedData, setPastedData] = useState('');
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const [showImportPanel, setShowImportPanel] = useState(false);

            // eBird life list (Common Names) used to auto-derive Seen status, plus manual
            // per-bird overrides that persist even when the TSV/report data is re-imported.
            const [lifeList, setLifeList] = useState(() => storageGet('cbc_lifeList', DEFAULT_LIFE_LIST));
            const [seenOverrides, setSeenOverrides] = useState(() => storageGet('cbc_seenOverrides', {}));
            const lifeListFileRef = useRef(null);
            const reportFileRef = useRef(null);

            useEffect(() => { storageSet('cbc_rawData', rawData); }, [rawData]);
            useEffect(() => { storageSet('cbc_lifeList', lifeList); }, [lifeList]);
            useEffect(() => { storageSet('cbc_seenOverrides', seenOverrides); }, [seenOverrides]);

            const lifeListSet = useMemo(() => new Set(lifeList.map(normalizeBirdName)), [lifeList]);

            // --- eBird API integration (species codes + daily region sightings) --------------
            // The key is seeded with the one you gave us so the app works immediately; it's
            // stored in localStorage from then on (not hardcoded elsewhere) and can be changed
            // any time in Settings. Note this file will contain that key in plain text — treat
            // it like any personal credential and don't publish/share this file publicly.
            const [ebirdApiKey, setEbirdApiKey] = useState(() => storageGet('cbc_ebirdApiKey', 'l531bs6l4t92'));
            const [ebirdRegion, setEbirdRegion] = useState(() => storageGet('cbc_ebirdRegion', 'US-MA-001')); // Barnstable County, MA
            const [taxonomyMap, setTaxonomyMap] = useState(() => storageGet('cbc_taxonomyMap', {}));
            const [taxonomySyncedAt, setTaxonomySyncedAt] = useState(() => storageGet('cbc_taxonomySyncedAt', null));
            const [ebirdSyncedAt, setEbirdSyncedAt] = useState(() => storageGet('cbc_ebirdSyncedAt', null));
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [showSettingsPanel, setShowSettingsPanel] = useState(false);

            useEffect(() => { storageSet('cbc_ebirdApiKey', ebirdApiKey); }, [ebirdApiKey]);
            useEffect(() => { storageSet('cbc_ebirdRegion', ebirdRegion); }, [ebirdRegion]);
            useEffect(() => { storageSet('cbc_taxonomyMap', taxonomyMap); }, [taxonomyMap]);
            useEffect(() => { storageSet('cbc_taxonomySyncedAt', taxonomySyncedAt); }, [taxonomySyncedAt]);
            useEffect(() => { storageSet('cbc_ebirdSyncedAt', ebirdSyncedAt); }, [ebirdSyncedAt]);

            // Effective seen status for a record: a manual override (if any) wins, otherwise
            // it's derived from whether the bird is on the life list.
            const getSeen = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                if (Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey)) {
                    return seenOverrides[overrideKey];
                }
                return lifeListSet.has(normalizeBirdName(record.bird)) ? 'Y' : 'N';
            };

            const setSeenOverride = (record, value) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => ({ ...prev, [overrideKey]: value }));
            };

            const clearSeenOverride = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => {
                    const next = { ...prev };
                    delete next[overrideKey];
                    return next;
                });
            };
            
            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL'); 
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL'); // Added bird selection state
            const [sortBy, setSortBy] = useState('bird');
            const [toastMsg, setToastMsg] = useState('');

            // Install Prompt Intercept State
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            const [basemapStyle, setBasemapStyle] = useState('dark');
            const [leafletLoaded, setLeafletLoaded] = useState(false);
            const [mapReady, setMapReady] = useState(false);
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayerGroup = useRef(null);

            const [isAddOpen, setIsAddOpen] = useState(false);
            const [newBird, setNewBird] = useState({
                locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: 'Thursday, July 9, 2026'
            });

            // Capture install criteria
            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });

                window.addEventListener('appinstalled', () => {
                    setIsInstallable(false);
                    showToast("Cape Cod Birding Console installed on Home Screen!");
                });
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                    setIsInstallable(false);
                }
            };

            const birdRecords = useMemo(() => {
                try {
                    return parseTSV(rawData);
                } catch (e) {
                    return [];
                }
            }, [rawData]);

            // birdRecords enriched with a computed `seen` field (life list match, or manual override)
            const enrichedRecords = useMemo(() => {
                return birdRecords.map(r => {
                    const overrideKey = `${r.locationName}|${r.bird}`.toLowerCase();
                    const isOverridden = Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey);
                    return { ...r, seen: getSeen(r), isOverridden };
                });
            }, [birdRecords, lifeListSet, seenOverrides]);

            const stats = useMemo(() => {
                const total = enrichedRecords.length;
                const seenCount = enrichedRecords.filter(r => r.seen === 'Y').length;
                const rareCount = enrichedRecords.filter(r => r.rare === 'Y').length;
                const priorityCount = enrichedRecords.filter(r => r.rare === 'Y' && r.seen === 'N').length;
                const uniqueSpots = new Set(enrichedRecords.map(r => r.locationName)).size;

                return {
                    total, seenCount, unseenCount: total - seenCount,
                    seenPercentage: total > 0 ? Math.round((seenCount / total) * 100) : 0,
                    rareCount, priorityCount, uniqueSpots
                };
            }, [enrichedRecords]);

            const updateRecord = (id, field, value) => {
                const updated = birdRecords.map(rec => {
                    if (rec.id === id) return { ...rec, [field]: value };
                    return rec;
                });
                setRawData(recordsToTSV(updated));
                showToast("Checklist synced.");
            };

            // Seen is no longer part of the TSV — toggling sets/clears a manual override that
            // persists independently, so it survives future TSV/report re-imports.
            const toggleSeen = (record) => {
                const current = getSeen(record);
                setSeenOverride(record, current === 'Y' ? 'N' : 'Y');
                showToast(current === 'Y' ? "Marked unseen (manual override)." : "Marked seen (manual override).");
            };

            const resetSeenToLifeList = (record) => {
                clearSeenOverride(record);
                showToast("Reverted to life-list status.");
            };

            const toggleRare = (id, currentRare) => {
                updateRecord(id, 'rare', currentRare === 'Y' ? 'N' : 'Y');
            };

            const deleteRecord = (id) => {
                const updated = birdRecords.filter(rec => rec.id !== id);
                setRawData(recordsToTSV(updated));
                showToast("Entry deleted.");
            };

            const filteredRecords = useMemo(() => {
                return enrichedRecords.filter(r => {
                    const matchesSearch = 
                        r.bird.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        r.locationName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        r.coordinates.includes(searchQuery);

                    const matchesLocation = selectedLocation === 'ALL' || r.locationName === selectedLocation;
                    const matchesBirdSelection = selectedBird === 'ALL' || r.bird === selectedBird;

                    if (!matchesSearch || !matchesLocation || !matchesBirdSelection) return false;

                    if (statusFilter === 'SEEN') return r.seen === 'Y';
                    if (statusFilter === 'UNSEEN') return r.seen === 'N';
                    if (statusFilter === 'RARE') return r.rare === 'Y';
                    if (statusFilter === 'PRIORITY') return r.rare === 'Y' && r.seen === 'N';
                    return true;
                }).sort((a, b) => {
                    if (sortBy === 'location') return a.locationName.localeCompare(b.locationName);
                    if (sortBy === 'bird') return a.bird.localeCompare(b.bird);
                    if (sortBy === 'date') return new Date(b.lastReported || 0) - new Date(a.lastReported || 0);
                    if (sortBy === 'status') return b.seen.localeCompare(a.seen);
                    return 0;
                });
            }, [enrichedRecords, searchQuery, statusFilter, selectedLocation, selectedBird, sortBy]);

            const mapLocations = useMemo(() => {
                const locMap = {};
                
                filteredRecords.forEach(r => {
                    if (!locMap[r.locationName]) {
                        locMap[r.locationName] = {
                            name: r.locationName, coords: r.coordinates, total: 0, seen: 0, unseenRares: 0, isActive: true, birds: []
                        };
                    }
                    const item = locMap[r.locationName];
                    item.total += 1;
                    if (r.seen === 'Y') item.seen += 1;
                    if (r.rare === 'Y') {
                        item.rares += 1;
                        if (r.seen === 'N') item.unseenRares += 1;
                    }
                    item.birds.push(r);
                });

                enrichedRecords.forEach(r => {
                    if (!locMap[r.locationName]) {
                        locMap[r.locationName] = {
                            name: r.locationName, coords: r.coordinates, total: 0, seen: 0, unseenRares: 0, isActive: false, birds: []
                        };
                    }
                    const item = locMap[r.locationName];
                    if (!item.isActive) {
                        item.total += 1;
                        if (r.seen === 'Y') item.seen += 1;
                        if (r.rare === 'Y') {
                            item.rares += 1;
                            if (r.seen === 'N') item.unseenRares += 1;
                        }
                        item.birds.push(r);
                    }
                });

                return Object.values(locMap).sort((a, b) => {
                    if (a.isActive && !b.isActive) return -1;
                    if (!a.isActive && b.isActive) return 1;
                    return b.unseenRares - a.unseenRares || b.total - a.total;
                });
            }, [filteredRecords, enrichedRecords]);

            // Leaflet JS CDN Injector & Map Booting Pipeline
            useEffect(() => {
                if (typeof window === 'undefined') return;
                
                const initMap = () => {
                    if (!mapContainerRef.current) return;
                    const map = L.map(mapContainerRef.current, { zoomControl: false }).setView([41.80, -70.30], 10);
                    mapInstance.current = map;
                    markerLayerGroup.current = L.layerGroup().addTo(map);
                    L.control.zoom({ position: 'topright' }).addTo(map);
                    setMapReady(true);
                };

                if (!document.getElementById('leaflet-css-pkg')) {
                    const link = document.createElement('link');
                    link.id = 'leaflet-css-pkg';
                    link.rel = 'stylesheet';
                    link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
                    document.head.appendChild(link);
                }

                if (!document.getElementById('leaflet-js-pkg')) {
                    const script = document.createElement('script');
                    script.id = 'leaflet-js-pkg';
                    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                    script.onload = () => {
                        setLeafletLoaded(true);
                        initMap();
                    };
                    document.head.appendChild(script);
                } else {
                    setLeafletLoaded(true);
                    if (window.L && !mapInstance.current) {
                        initMap();
                    }
                }

                return () => {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                        setMapReady(false);
                    }
                };
            }, []);

            useEffect(() => {
                if (!mapInstance.current || !mapReady) return;
                const map = mapInstance.current;

                map.eachLayer(layer => {
                    if (layer instanceof L.TileLayer) map.removeLayer(layer);
                });

                let tileUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                let att = '© CARTO';

                if (basemapStyle === 'streets') {
                    tileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
                    att = '© OSM';
                } else if (basemapStyle === 'satellite') {
                    tileUrl = 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}';
                    att = 'Esri';
                }

                L.tileLayer(tileUrl, { attribution: att }).addTo(map);
            }, [basemapStyle, mapReady]);

            // Draw markers instantly on launch
            useEffect(() => {
                if (!mapInstance.current || !markerLayerGroup.current || !mapReady) return;
                const group = markerLayerGroup.current;
                group.clearLayers();
                const bounds = [];

                mapLocations.forEach(loc => {
                    if (!loc.coords) return;
                    const parts = loc.coords.split(',');
                    const lat = parseFloat(parts[0]);
                    const lng = parseFloat(parts[1]);
                    if (isNaN(lat) || isNaN(lng)) return;

                    const isFocused = selectedLocation === loc.name;
                    const markerColor = loc.unseenRares > 0 ? '#f59e0b' : (loc.seen === loc.total ? '#10b981' : '#0d9488');

                    const marker = L.circleMarker([lat, lng], {
                        radius: isFocused ? 13 : 7,
                        fillColor: markerColor,
                        color: isFocused ? '#ffffff' : '#020617',
                        weight: isFocused ? 3 : 1.5,
                        fillOpacity: loc.isActive ? 0.9 : 0.2
                    });

                    marker.bindPopup(`
                        <div class="text-xs">
                            <h4 class="font-bold text-teal-400">📍 ${loc.name}</h4>
                            <div class="mt-1">Seen Progress: <strong>${loc.seen} / ${loc.total}</strong></div>
                        </div>
                    `);

                    marker.on('click', () => setSelectedLocation(loc.name));
                    marker.addTo(group);

                    if (loc.isActive) bounds.push([lat, lng]);
                });

                if (selectedLocation === 'ALL' && bounds.length > 0) {
                    mapInstance.current.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
                } else if (selectedLocation !== 'ALL') {
                    const target = mapLocations.find(l => l.name === selectedLocation);
                    if (target && target.coords) {
                        const parts = target.coords.split(',');
                        mapInstance.current.setView([parseFloat(parts[0]), parseFloat(parts[1])], 13);
                    }
                }
            }, [mapLocations, selectedLocation, mapReady]);

            const handleMetricClick = (filterType) => {
                setStatusFilter(prev => prev === filterType ? 'ALL' : filterType);
            };

            const handleAddSubmit = (e) => {
                e.preventDefault();
                const updated = [...birdRecords, { ...newBird, id: `custom-${Date.now()}` }];
                setRawData(recordsToTSV(updated));
                setIsAddOpen(false);
                setNewBird({ locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: 'Thursday, July 9, 2026' });
                showToast("Added target successfully!");
            };

            // Geolocation Sensor Handler
            const handleGetLocation = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude.toFixed(7);
                            const lng = position.coords.longitude.toFixed(7);
                            setNewBird(prev => ({ ...prev, coordinates: `${lat}, ${lng}` }));
                            showToast("Coordinates captured!");
                        },
                        (error) => {
                            showToast("Failed to fetch coordinates. Check sensor permissions.");
                        }
                    );
                } else {
                    showToast("Sensor tracking not supported by this device.");
                }
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            // --- Import: eBird life list CSV -------------------------------------------------
            // --- eBird API: species code taxonomy sync ---------------------------------------
            // Downloads eBird's official species taxonomy once (comName -> speciesCode for
            // every species) so every "eBird ↗" link points at the correct species page,
            // including birds added later that were never hand-mapped. Taxonomy only changes
            // once a year (each August), so this is skipped if synced within the last 30 days.
            const fetchTaxonomyMap = async (key) => {
                const res = await fetch('https://api.ebird.org/v2/ref/taxonomy/ebird?fmt=json&cat=species&locale=en', {
                    headers: { 'x-ebirdapitoken': key }
                });
                if (!res.ok) throw new Error(`Taxonomy sync failed (HTTP ${res.status})`);
                const data = await res.json();
                const map = {};
                data.forEach(t => {
                    if (t.comName && t.speciesCode) map[normalizeBirdName(t.comName)] = t.speciesCode;
                });
                return map;
            };

            // --- eBird API: daily region sightings (recent + notable/rare) -------------------
            // Pulls both feeds for the configured region (default Barnstable County, MA) and
            // returns them in the same shape mergeReportEntries expects. Notable/rare results
            // are tagged rare='Y'; everything else rare='N' (mergeReportEntries keeps 'Y' if a
            // bird was already flagged rare from an earlier import).
            const fetchRegionSightings = async (key, regionCode) => {
                const headers = { 'x-ebirdapitoken': key };
                const [recentRes, notableRes] = await Promise.all([
                    fetch(`https://api.ebird.org/v2/data/obs/${regionCode}/recent?back=14&fmt=json`, { headers }),
                    fetch(`https://api.ebird.org/v2/data/obs/${regionCode}/recent/notable?back=30&fmt=json`, { headers })
                ]);
                if (!recentRes.ok) throw new Error(`Recent sightings fetch failed (HTTP ${recentRes.status})`);
                if (!notableRes.ok) throw new Error(`Notable sightings fetch failed (HTTP ${notableRes.status})`);
                const [recent, notable] = await Promise.all([recentRes.json(), notableRes.json()]);

                const notableKeys = new Set(notable.map(o => `${o.locId}|${o.speciesCode}`));
                const toEntry = (o) => ({
                    locationName: o.locName || 'Unknown Location',
                    coordinates: (o.lat != null && o.lng != null) ? `${o.lat}, ${o.lng}` : '',
                    bird: o.comName,
                    rare: notableKeys.has(`${o.locId}|${o.speciesCode}`) ? 'Y' : 'N',
                    lastReported: formatLongDate(new Date((o.obsDt || '').replace(' ', 'T')))
                });
                return [...recent, ...notable].filter(o => o.comName && o.locName).map(toEntry);
            };

            // Runs a full sync: taxonomy (if stale/empty) + today's region sightings, merged
            // into the existing dataset. Called on load once a day automatically, and any time
            // from the "Sync Now" button in Settings.
            const runEbirdSync = async ({ silent = false } = {}) => {
                if (!ebirdApiKey) {
                    if (!silent) showToast("Add your eBird API key in Settings first.");
                    return;
                }
                setIsSyncing(true);
                setSyncError('');
                try {
                    const taxonomyStale = !taxonomySyncedAt || (Date.now() - taxonomySyncedAt > 30 * 24 * 60 * 60 * 1000) || Object.keys(taxonomyMap).length === 0;
                    if (taxonomyStale) {
                        const map = await fetchTaxonomyMap(ebirdApiKey);
                        setTaxonomyMap(map);
                        setTaxonomySyncedAt(Date.now());
                    }
                    const entries = await fetchRegionSightings(ebirdApiKey, ebirdRegion);
                    mergeReportEntries(entries, { silent: true });
                    setEbirdSyncedAt(Date.now());
                    if (!silent) showToast(`Synced with eBird — ${entries.length} sightings checked for ${ebirdRegion}.`);
                } catch (err) {
                    const msg = err && err.message ? err.message : 'Sync failed';
                    setSyncError(msg);
                    if (!silent) showToast(`eBird sync failed: ${msg}`);
                } finally {
                    setIsSyncing(false);
                }
            };

            // Auto-sync once per day on load, if a key is present.
            useEffect(() => {
                if (ebirdApiKey && (!ebirdSyncedAt || Date.now() - ebirdSyncedAt > 24 * 60 * 60 * 1000)) {
                    runEbirdSync({ silent: true });
                }
                // eslint-disable-next-line react-hooks/exhaustive-deps
            }, []);

            const handleLifeListFile = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = ''; // allow re-selecting the same file later
                if (!file) return;
                try {
                    const text = await file.text();
                    const names = parseLifeListCSV(text);
                    if (names.length === 0) {
                        showToast("Couldn't find a 'Common Name' column in that CSV.");
                        return;
                    }
                    setLifeList(names);
                    showToast(`Life list updated — ${names.length} species loaded.`);
                } catch (err) {
                    showToast("Failed to read that life list file.");
                }
            };

            // --- Import: sighting report (.docx rare-alert export, or plain .txt/.tsv) -------
            // Merges new/updated sightings into the existing dataset rather than replacing it,
            // so hotspots and species not present in the uploaded report are kept, and manual
            // seen overrides (keyed by location+bird) are untouched.
            const mergeReportEntries = (entries, { silent = false } = {}) => {
                if (entries.length === 0) {
                    if (!silent) showToast("No recognizable sighting rows found in that file.");
                    return;
                }
                const byKey = new Map(birdRecords.map(r => [`${r.locationName}|${r.bird}`.toLowerCase(), r]));
                let added = 0, updated = 0;
                entries.forEach(entry => {
                    const key = `${entry.locationName}|${entry.bird}`.toLowerCase();
                    const existing = byKey.get(key);
                    if (existing) {
                        const newer = new Date(entry.lastReported || 0) >= new Date(existing.lastReported || 0);
                        byKey.set(key, {
                            ...existing,
                            coordinates: existing.coordinates || entry.coordinates,
                            rare: existing.rare === 'Y' || entry.rare === 'Y' ? 'Y' : 'N',
                            lastReported: newer ? entry.lastReported : existing.lastReported
                        });
                        updated++;
                    } else {
                        byKey.set(key, {
                            id: `${entry.locationName}-${entry.bird}-${Date.now()}-${added}`,
                            locationName: entry.locationName,
                            coordinates: entry.coordinates,
                            bird: entry.bird,
                            rare: entry.rare,
                            lastReported: entry.lastReported
                        });
                        added++;
                    }
                });
                const merged = Array.from(byKey.values()).sort((a, b) => a.locationName.localeCompare(b.locationName));
                setRawData(recordsToTSV(merged));
                if (!silent) showToast(`Report merged — ${added} new, ${updated} updated. Seen status recalculated from your life list.`);
            };

            const handleReportFile = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = '';
                if (!file) return;
                try {
                    let text;
                    if (file.name.toLowerCase().endsWith('.docx')) {
                        if (!window.mammoth) {
                            showToast("Docx reader failed to load — check your connection and try again.");
                            return;
                        }
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await window.mammoth.extractRawText({ arrayBuffer });
                        text = result.value;
                    } else {
                        text = await file.text();
                    }
                    const entries = parseAlertReport(text);
                    mergeReportEntries(entries);
                } catch (err) {
                    showToast("Failed to read that report file.");
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 px-4 py-3 md:px-8">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-tr from-teal-500 to-emerald-400 p-2.5 rounded-xl text-slate-950">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="text-lg md:text-xl font-black bg-gradient-to-r from-teal-400 to-emerald-400 bg-clip-text text-transparent">CAPE COD BIRD SIGHTINGS</h1>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Interactive Cape Cod Bird Sighting Portal</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2 items-center">
                                {isInstallable && (
                                    <button 
                                        onClick={handleInstallApp}
                                        className="bg-emerald-500 text-slate-950 font-black px-3.5 py-2 rounded-xl text-xs hover:bg-emerald-400 transition flex items-center gap-1.5 shadow-lg shadow-emerald-500/20"
                                    >
                                        <span>📲</span> Install App
                                    </button>
                                )}
                                <button onClick={() => setIsAddOpen(true)} className="bg-teal-500 text-slate-950 font-bold px-4 py-2 rounded-xl text-xs shadow-lg hover:bg-teal-400 transition">+ Sighting</button>
                                <button onClick={() => { setPastedData(rawData); setShowSyncPanel(!showSyncPanel); }} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition">Sync TSV</button>
                                <button onClick={() => setShowImportPanel(!showImportPanel)} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition">Import</button>
                                <button onClick={() => setShowSettingsPanel(!showSettingsPanel)} className="bg-slate-800 text-slate-300 border border-slate-700 font-semibold px-4 py-2 rounded-xl text-xs hover:bg-slate-700 transition relative">
                                    Settings
                                    {isSyncing && <span className="absolute -top-1 -right-1 w-2 h-2 bg-teal-400 rounded-full animate-ping" />}
                                </button>
                                <input ref={lifeListFileRef} type="file" accept=".csv" onChange={handleLifeListFile} className="hidden" />
                                <input ref={reportFileRef} type="file" accept=".docx,.txt,.tsv" onChange={handleReportFile} className="hidden" />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-6 md:px-8 flex-1 w-full space-y-6">
                        {showSettingsPanel && (
                            <div className="bg-slate-900 border border-teal-500/30 rounded-2xl p-5 space-y-4 shadow-xl">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-sm font-bold text-teal-400">eBird API Settings</h3>
                                    <button onClick={() => setShowSettingsPanel(false)} className="text-slate-400 text-xs px-2 hover:text-white">Close</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">eBird API Key</label>
                                        <input
                                            type="text"
                                            value={ebirdApiKey}
                                            onChange={(e) => setEbirdApiKey(e.target.value.trim())}
                                            placeholder="e.g. l531bs6l4t92"
                                            className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none"
                                        />
                                        <p className="text-[9px] text-slate-500">Used for accurate eBird species links and daily sighting sync. Get a free key at ebird.org/api/keygen. Stored only on this device.</p>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] text-slate-400 uppercase tracking-wider font-bold">eBird Region Code</label>
                                        <input
                                            type="text"
                                            value={ebirdRegion}
                                            onChange={(e) => setEbirdRegion(e.target.value.trim())}
                                            placeholder="US-MA-001"
                                            className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 text-xs font-mono focus:outline-none"
                                        />
                                        <p className="text-[9px] text-slate-500">Default is Barnstable County, MA (US-MA-001). Find other region codes on eBird's Explore page URL.</p>
                                    </div>
                                </div>
                                <div className="bg-slate-950 border border-slate-800 rounded-xl p-3 flex flex-wrap items-center justify-between gap-3 text-[10px] text-slate-400">
                                    <div className="space-y-0.5">
                                        <div>Species codes synced: <strong className="text-teal-400">{Object.keys(taxonomyMap).length}</strong>{taxonomySyncedAt ? ` (as of ${new Date(taxonomySyncedAt).toLocaleDateString()})` : ' (not yet synced)'}</div>
                                        <div>Region sightings last synced: <strong className="text-teal-400">{ebirdSyncedAt ? new Date(ebirdSyncedAt).toLocaleString() : 'never'}</strong></div>
                                        {syncError && <div className="text-rose-400">Last sync error: {syncError}</div>}
                                    </div>
                                    <button
                                        onClick={() => runEbirdSync({ silent: false })}
                                        disabled={isSyncing}
                                        className="bg-teal-500 disabled:opacity-50 text-slate-950 font-bold px-4 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition"
                                    >
                                        {isSyncing ? 'Syncing…' : 'Sync Now'}
                                    </button>
                                </div>
                                <p className="text-[9px] text-slate-500">Auto-syncs once a day whenever this page is opened (this is a static PWA with no server, so it can't run in the background — opening the app is what triggers the daily check). Pulls both recent and notable/rare sightings for your region and merges them in without touching existing entries or manual seen overrides.</p>
                            </div>
                        )}
                        {showImportPanel && (
                            <div className="bg-slate-900 border border-teal-500/30 rounded-2xl p-5 space-y-4 shadow-xl">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-sm font-bold text-teal-400">Import Data</h3>
                                    <button onClick={() => setShowImportPanel(false)} className="text-slate-400 text-xs px-2 hover:text-white">Close</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="bg-slate-950 border border-slate-800 rounded-xl p-4 space-y-2">
                                        <h4 className="text-xs font-bold text-slate-200">eBird Life List (.csv)</h4>
                                        <p className="text-[10px] text-slate-400">Your "Seen" status is auto-derived by matching birds against this list. Currently loaded: <strong className="text-teal-400">{lifeList.length}</strong> species.</p>
                                        <button onClick={() => lifeListFileRef.current?.click()} className="w-full bg-teal-500 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition">Upload Life List CSV</button>
                                    </div>
                                    <div className="bg-slate-950 border border-slate-800 rounded-xl p-4 space-y-2">
                                        <h4 className="text-xs font-bold text-slate-200">Sighting Report (.docx / .txt / .tsv)</h4>
                                        <p className="text-[10px] text-slate-400">Upload an eBird rare-alert export (like your unseen report doc) to merge new sightings into your hotspot data without losing existing entries or manual overrides.</p>
                                        <button onClick={() => reportFileRef.current?.click()} className="w-full bg-teal-500 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition">Upload Report</button>
                                    </div>
                                </div>
                                {Object.keys(seenOverrides).length > 0 && (
                                    <div className="flex items-center justify-between bg-slate-950 border border-slate-800 rounded-xl p-3">
                                        <span className="text-[10px] text-slate-400">{Object.keys(seenOverrides).length} manual seen override(s) active — these persist across imports.</span>
                                        <button onClick={() => { setSeenOverrides({}); showToast("All manual overrides cleared."); }} className="text-[10px] text-rose-400 hover:underline font-bold">Clear all overrides</button>
                                    </div>
                                )}
                            </div>
                        )}
                        {showSyncPanel && (
                            <div className="bg-slate-900 border border-teal-500/30 rounded-2xl p-5 space-y-4 shadow-xl">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-sm font-bold text-teal-400">Database Editor</h3>
                                    <button onClick={() => setShowSyncPanel(false)} className="text-slate-400 text-xs px-2 hover:text-white">Close</button>
                                </div>
                                <textarea className="w-full h-44 bg-slate-950 border border-slate-800 rounded-xl p-3 font-mono text-[10px] text-emerald-400 focus:outline-none" value={pastedData} onChange={(e) => setPastedData(e.target.value)} />
                                <div className="flex justify-end gap-2 text-xs">
                                    <button onClick={() => { setRawData(pastedData); setShowSyncPanel(false); showToast("Checklist synced!"); }} className="bg-teal-500 text-slate-950 px-4 py-1.5 rounded font-bold">Apply</button>
                                </div>
                            </div>
                        )}

                        <section className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                            <div onClick={() => handleMetricClick('SEEN')} className={`p-4 rounded-2xl border transition-all flex flex-col justify-between cursor-pointer ${statusFilter === 'SEEN' ? 'bg-teal-950/40 border-teal-400' : 'bg-slate-900 border-slate-800'}`}>
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest font-black">Encountered species</span>
                                <div className="flex items-baseline gap-2 mt-2">
                                    <span className="text-3xl font-black text-white">{stats.seenCount}</span>
                                    <span className="text-slate-500 text-xs">/ {stats.total} seen</span>
                                </div>
                                <div className="mt-3">
                                    <div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                                        <div className="bg-teal-500 h-full transition-all" style={{ width: `${stats.seenPercentage}%` }} />
                                    </div>
                                    <span className="text-[9px] text-teal-400 mt-1 block font-bold">{stats.seenPercentage}% Complete</span>
                                </div>
                            </div>

                            <div onClick={() => handleMetricClick('UNSEEN')} className={`p-4 rounded-2xl border transition-all flex flex-col justify-between cursor-pointer ${statusFilter === 'UNSEEN' ? 'bg-sky-950/40 border-sky-400' : 'bg-slate-900 border-slate-800'}`}>
                                <span className="text-[10px] text-slate-400 uppercase tracking-widest font-black">Unseen species</span>
                                <div className="flex items-baseline gap-2 mt-2">
                                    <span className="text-3xl font-black text-sky-400">{stats.unseenCount}</span>
                                    <span className="text-slate-500 text-xs">remaining targets</span>
                                </div>
                                <span className="text-[9px] text-slate-400 mt-3 block font-bold">Click to filter remaining checklist</span>
                            </div>

                            <div onClick={() => handleMetricClick('RARE')} className={`p-4 rounded-2xl border transition-all flex flex-col justify-between cursor-pointer ${statusFilter === 'RARE' ? 'bg-amber-950/40 border-amber-400' : 'bg-slate-900 border-slate-800'}`}>
                                <span className="text-[10px] text-amber-400 uppercase tracking-widest font-black flex items-center gap-1.5">
                                    <span className="w-1.5 h-1.5 bg-amber-400 rounded-full animate-ping" />
                                    Rare species
                                </span>
                                <div className="flex items-baseline gap-2 mt-2">
                                    <span className="text-3xl font-black text-amber-300">{stats.rareCount}</span>
                                    <span className="text-slate-500 text-xs">checked off</span>
                                </div>
                                <span className="text-[9px] text-slate-400 mt-3 block font-bold">Click to show rare distribution paths</span>
                            </div>

                            <div onClick={() => handleMetricClick('PRIORITY')} className={`p-4 rounded-2xl border transition-all flex flex-col justify-between cursor-pointer ${statusFilter === 'PRIORITY' ? 'bg-rose-950/40 border-rose-400' : 'bg-slate-900 border-slate-800'}`}>
                                <span className="text-[10px] text-rose-400 uppercase tracking-widest font-black">Priority targets</span>
                                <div className="flex items-baseline gap-2 mt-2">
                                    <span className="text-3xl font-black text-rose-400">{stats.priorityCount}</span>
                                    <span className="text-slate-500 text-xs">unseen & rare</span>
                                </div>
                                <span className="text-[9px] text-rose-300 mt-3 block font-bold">Click to locate urgent search zones</span>
                            </div>
                        </section>

                        <section className="bg-slate-900 border border-slate-800 rounded-3xl p-5 shadow-2xl relative overflow-hidden">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                                <div>
                                    <div className="flex items-center gap-2">
                                        <span className="bg-teal-500/10 text-teal-300 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Live GIS Basemap</span>
                                        {selectedLocation !== 'ALL' && <span className="text-slate-500 text-xs font-mono">Filter active: {selectedLocation}</span>}
                                    </div>
                                    <h2 className="text-base font-black text-white mt-1">Sighting Map</h2>
                                </div>

                                <div className="flex bg-slate-950 rounded-xl p-1 border border-slate-800 text-[11px] font-bold">
                                    {[
                                        { id: 'dark', label: 'Dark Navy' },
                                        { id: 'streets', label: 'Streets' },
                                        { id: 'satellite', label: 'Satellite' }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setBasemapStyle(opt.id)} className={`px-3 py-1.5 rounded-lg transition-all ${basemapStyle === opt.id ? 'bg-slate-800 text-teal-400' : 'text-slate-400 hover:text-white'}`}>{opt.label}</button>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                                <div className="lg:col-span-8 bg-slate-950 border border-slate-800 rounded-2xl min-h-[400px] relative overflow-hidden z-10">
                                    <div ref={mapContainerRef} className="w-full h-full min-h-[400px]" />
                                </div>

                                <div className="lg:col-span-4 bg-slate-950/40 border border-slate-800/80 rounded-2xl p-4 flex flex-col justify-between space-y-4">
                                    <div>
                                        <h3 className="text-xs font-extrabold uppercase tracking-widest text-slate-400 mb-2">Focused Hotspot details</h3>
                                        {selectedLocation === 'ALL' ? (
                                            <div className="space-y-3 py-6 text-center">
                                                <p className="text-slate-500 text-xs italic">Select any plotted node on the map, or select from the registry below to investigate focused regional wildlife densities.</p>
                                            </div>
                                        ) : (
                                            (() => {
                                                const activeLoc = mapLocations.find(l => l.name === selectedLocation);
                                                if (!activeLoc) return null;
                                                return (
                                                    <div className="space-y-3">
                                                        <div className="border-b border-slate-800 pb-2">
                                                            <h4 className="text-xs font-black text-white">{activeLoc.name}</h4>
                                                            <span className="text-[9px] text-slate-400 font-mono block mt-1">Coords: {activeLoc.coords}</span>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2 text-center text-xs">
                                                            <div className="bg-slate-900 p-2 rounded-lg border border-slate-800">
                                                                <span className="text-slate-500 block text-[8px] uppercase font-bold">Rarity footprint</span>
                                                                <span className="font-extrabold text-amber-400">{activeLoc.unseenRares} Targets</span>
                                                            </div>
                                                            <div className="bg-slate-900 p-2 rounded-lg border border-slate-800">
                                                                <span className="text-slate-500 block text-[8px] uppercase font-bold">Encounter state</span>
                                                                <span className="font-extrabold text-teal-400">{activeLoc.seen} / {activeLoc.total}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })()
                                        )}
                                    </div>
                                    {selectedLocation !== 'ALL' && <button onClick={() => setSelectedLocation('ALL')} className="w-full bg-slate-900 hover:bg-slate-800 border border-slate-800 text-xs font-bold py-2 rounded-xl transition">Reset Focus</button>}
                                </div>
                            </div>
                        </section>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-5">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-4 shadow-lg">
                                    <div>
                                        <h2 className="text-xs font-extrabold uppercase text-teal-400 tracking-wider">Hotspots ranking matrix</h2>
                                        <p className="text-[11px] text-slate-400 mt-1">Real-time status tracking updates on geographic markers</p>
                                    </div>
                                    <div className="space-y-2.5 max-h-[480px] overflow-y-auto pr-1">
                                        {mapLocations.map((loc, idx) => {
                                            const progressPct = loc.total > 0 ? Math.round((loc.seen / loc.total) * 100) : 0;
                                            const isFocused = selectedLocation === loc.name;
                                            return (
                                                <div key={idx} onClick={() => setSelectedLocation(isFocused ? 'ALL' : loc.name)} className={`p-3 rounded-xl border transition cursor-pointer text-xs ${isFocused ? 'bg-slate-850 border-teal-500 shadow-md' : 'bg-slate-950 border-slate-800 hover:border-slate-700'} ${!loc.isActive ? 'opacity-40' : ''}`}>
                                                    <div className="flex justify-between items-start gap-2 mb-1">
                                                        <h3 className="font-bold text-slate-200 leading-tight">{loc.name}</h3>
                                                        {loc.unseenRares > 0 && loc.isActive && <span className="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-1.5 py-0.5 rounded text-[8px] font-black">⚠️ {loc.unseenRares} Rare Target</span>}
                                                    </div>
                                                    <div className="flex justify-between items-center text-[10px] text-slate-400 mt-1.5">
                                                        <span>Species: <strong>{loc.total}</strong></span>
                                                        <span>Progress: <strong>{progressPct}%</strong></span>
                                                    </div>
                                                    <div className="mt-2"><div className="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden"><div className="bg-teal-500 h-full transition-all" style={{ width: `${progressPct}%` }} /></div></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7 space-y-4">
                                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-4 shadow-md">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <input type="text" placeholder="Search species..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-xl px-4 py-2 text-xs focus:outline-none" />
                                        <select value={selectedLocation} onChange={(e) => setSelectedLocation(e.target.value)} className="w-full bg-slate-950 border border-slate-800 text-slate-300 rounded-xl px-4 py-2 text-xs focus:outline-none">
                                            <option value="ALL">📍 All Hotspots</option>
                                            {Array.from(new Set(birdRecords.map(r => r.locationName))).sort().map((loc, idx) => (
                                                <option key={idx} value={loc}>{loc}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="flex flex-wrap items-center justify-between gap-3 pt-1">
                                        <div className="flex flex-wrap gap-1">
                                            {['ALL', 'SEEN', 'UNSEEN', 'RARE', 'PRIORITY'].map(tab => (
                                                <button key={tab} onClick={() => setStatusFilter(tab)} className={`px-3 py-1 rounded-lg text-[10px] font-bold transition-all ${statusFilter === tab ? 'bg-teal-500 text-slate-950' : 'bg-slate-950 text-slate-400 hover:text-white'}`}>{tab}</button>
                                            ))}
                                        </div>
                                        <div className="flex items-center gap-1.5 text-xs text-slate-400">
                                            <span>Sort:</span>
                                            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-slate-950 border border-slate-800 rounded-lg text-slate-300 px-2.5 py-1 text-[10px]">
                                                <option value="bird">Species</option>
                                                <option value="location">Hotspot</option>
                                                <option value="date">Date</option>
                                            </select>
                                        </div>
                                    </div>
                                    
                                    {/* Species filter reset banner */}
                                    {selectedBird !== 'ALL' && (
                                        <div className="bg-teal-950/40 border border-teal-500/20 rounded-xl p-3 flex justify-between items-center text-xs">
                                            <span className="text-teal-400">Isolating target: <strong className="text-white">{selectedBird}</strong></span>
                                            <button onClick={() => setSelectedBird('ALL')} className="text-rose-400 hover:underline font-bold">Clear Target Focus</button>
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                                    <div className="divide-y divide-slate-800/60 max-h-[500px] overflow-y-auto">
                                        {filteredRecords.length === 0 ? <div className="p-8 text-center text-slate-500 text-xs">No matching records.</div> : filteredRecords.map((r) => (
                                            <div 
                                                key={r.id} 
                                                onClick={() => setSelectedBird(selectedBird === r.bird ? 'ALL' : r.bird)}
                                                className={`p-3.5 flex items-center justify-between gap-4 text-xs transition duration-150 cursor-pointer ${
                                                    selectedBird === r.bird ? 'bg-teal-950/20 border-l-4 border-teal-500' : 'hover:bg-slate-900/60'
                                                }`}
                                            >
                                                <div className="flex items-center gap-3 min-w-0 flex-1">
                                                    <BirdThumbnail birdName={r.bird} />
                                                    <div className="min-w-0 flex-1">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <span className="font-extrabold text-white text-xs truncate">{r.bird}</span>
                                                            {r.rare === 'Y' && <span className="bg-amber-500/10 text-amber-400 border border-amber-500/20 px-1.5 py-0.5 rounded text-[8px] font-bold">★ Rare</span>}
                                                            <span className="text-[9px] text-slate-500">{r.lastReported}</span>
                                                        </div>
                                                        <div className="text-slate-400 flex items-center gap-1.5 flex-wrap text-[11px] mt-0.5">
                                                            <span>📍 {r.locationName}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <a 
                                                        href={getEBirdUrl(r.bird, taxonomyMap)} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        onClick={(e) => e.stopPropagation()} // Stop triggering row focus filter
                                                        className="px-2.5 py-1 rounded bg-slate-950 hover:bg-slate-800 text-teal-400 border border-slate-800 text-[10px] font-bold tracking-tight transition"
                                                    >
                                                        eBird ↗
                                                    </a>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); toggleSeen(r); }} 
                                                        title={r.isOverridden ? "Manually overridden — click to flip" : "Derived from your life list — click to override"}
                                                        className={`px-3 py-1 rounded border transition text-[10px] font-bold ${r.seen === 'Y' ? 'bg-teal-500/10 text-teal-400 border-teal-500/20' : 'bg-slate-900 text-slate-400 border-slate-800'}`}
                                                    >
                                                        {r.seen === 'Y' ? '✓ Seen' : 'Mark Seen'}{r.isOverridden ? ' *' : ''}
                                                    </button>
                                                    {r.isOverridden && (
                                                        <button
                                                            onClick={(e) => { e.stopPropagation(); resetSeenToLifeList(r); }}
                                                            title="Revert to life-list-derived status"
                                                            className="p-1.5 bg-slate-900 border border-slate-800 hover:text-teal-400 rounded-lg text-slate-500 transition text-[10px]"
                                                        >
                                                            ↺
                                                        </button>
                                                    )}
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); deleteRecord(r.id); }} 
                                                        className="p-1.5 bg-slate-900 border border-slate-800 hover:text-red-400 rounded-lg text-slate-500 transition"
                                                    >
                                                        ✕
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {isAddOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-2xl">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                                    <h3 className="text-xs font-extrabold uppercase text-teal-400 tracking-wider">New Entry</h3>
                                    <button onClick={() => setIsAddOpen(false)} className="text-slate-400 text-sm font-black">✕</button>
                                </div>
                                <form onSubmit={handleAddSubmit} className="space-y-3.5 text-[11px]">
                                    <div>
                                        <label className="text-slate-400 block font-bold mb-1">Hotspot Name</label>
                                        <input type="text" required placeholder="e.g. Race Point Base" value={newBird.locationName} onChange={(e) => setNewBird({ ...newBird, locationName: e.target.value })} className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 focus:outline-none"/>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 block font-bold mb-1">Coordinates (lat, lng)</label>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="e.g. 42.069, -70.238" value={newBird.coordinates} onChange={(e) => setNewBird({ ...newBird, coordinates: e.target.value })} className="flex-grow bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 focus:outline-none"/>
                                            <button type="button" onClick={handleGetLocation} className="bg-teal-500 text-slate-950 font-bold px-3 py-1.5 rounded-lg text-xs hover:bg-teal-400 transition" title="Auto-fill device GPS coordinates">📍 GPS</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-slate-400 block font-bold mb-1">Species Name</label>
                                        <input type="text" required placeholder="e.g. Common Murre" value={newBird.bird} onChange={(e) => setNewBird({ ...newBird, bird: e.target.value })} className="w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-1.5 focus:outline-none"/>
                                    </div>
                                    <div className="flex justify-end gap-2 pt-2">
                                        <button type="button" onClick={() => setIsAddOpen(false)} className="bg-slate-800 text-slate-300 px-3 py-1.5 rounded-lg font-bold">Cancel</button>
                                        <button type="submit" className="bg-teal-500 text-slate-950 px-4 py-1.5 rounded-lg font-bold hover:bg-teal-400 transition">Submit</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Live image lookup utility component via Wikipedia summaries API
        function BirdThumbnail({ birdName }) {
            const [imgUrl, setImgUrl] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                let active = true;
                async function fetchImage() {
                    try {
                        const response = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(birdName)}`);
                        if (!response.ok) throw new Error('Wiki summary lookup error');
                        const data = await response.json();
                        if (active) {
                            if (data.thumbnail && data.thumbnail.source) {
                                setImgUrl(data.thumbnail.source);
                            }
                            setLoading(false);
                        }
                    } catch (e) {
                        if (active) setLoading(false);
                    }
                }
                fetchImage();
                return () => { active = false; };
            }, [birdName]);

            if (loading) {
                return <div className="w-12 h-12 bg-slate-900 rounded-xl border border-slate-800/80 animate-pulse shrink-0" />;
            }

            if (imgUrl) {
                return (
                    <img 
                        src={imgUrl} 
                        alt={birdName} 
                        className="w-12 h-12 object-cover rounded-xl border border-slate-800 shrink-0 shadow" 
                        onError={(e) => { e.target.style.display = 'none'; }}
                    />
                );
            }

            return (
                <div className="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center shrink-0 border border-slate-800/80">
                    <svg className="w-5 h-5 text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </div>
            );
        }

        // Note: the TSV format no longer carries a "Seen" column. Seen/unseen status is
        // derived at render time by comparing each bird against the uploaded eBird life list
        // (see computeSeen / useLifeListSet below), with room for manual overrides that survive
        // TSV re-imports (see seenOverrides state in App).
        function parseTSV(text) {
            const lines = text.trim().split('\n');
            const result = [];
            let currentLoc = "";
            let currentCoords = "";

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (i === 0 && line.toLowerCase().includes('location name')) continue; 
                const cols = line.split('\t');
                if (cols.length < 3) continue;

                let loc = cols[0].trim();
                let coords = cols[1].trim();
                const bird = cols[2].trim();
                const rare = cols[3]?.trim() || "N";
                const date = cols[4]?.trim() || "";

                if (loc !== "") {
                    currentLoc = loc;
                    currentCoords = coords;
                }

                result.push({
                    id: `${currentLoc}-${bird}-${i}`,
                    locationName: currentLoc,
                    coordinates: currentCoords,
                    bird: bird,
                    rare: rare,
                    lastReported: date
                });
            }
            return result;
        }

        function recordsToTSV(records) {
            const header = "Location Name\tCoordinates\tBird\tRare (Y/N)\tLast Reported";
            let lastLoc = "";
            let lastCoords = "";
            const rows = records.map(r => {
                let locCol = "";
                let coordCol = "";
                if (r.locationName !== lastLoc || r.coordinates !== lastCoords) {
                    locCol = r.locationName;
                    coordCol = r.coordinates;
                    lastLoc = r.locationName;
                    lastCoords = r.coordinates;
                }
                return `${locCol}\t${coordCol}\t${r.bird}\t${r.rare}\t${r.lastReported}`;
            });
            return [header, ...rows].join('\n');
        }

        // Strips parenthetical subspecies/form qualifiers and normalizes case for matching,
        // e.g. "Willet (Eastern)" -> "willet", so life-list comparisons aren't thrown off by them.
        // Formats a Date as "Thursday, July 9, 2026" to match this app's Last Reported style.
        function formatLongDate(dt) {
            return isNaN(dt) ? '' : dt.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function normalizeBirdName(name) {
            return (name || "").replace(/\s*\([^)]*\)\s*/g, "").trim().toLowerCase();
        }

        // Parses an uploaded eBird life list CSV export and returns a sorted array of unique
        // Common Names. Handles quoted fields (commas inside quotes) per standard CSV escaping.
        function parseLifeListCSV(text) {
            const rows = [];
            let row = [], field = "", inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (inQuotes) {
                    if (c === '"') {
                        if (text[i + 1] === '"') { field += '"'; i++; }
                        else inQuotes = false;
                    } else field += c;
                } else {
                    if (c === '"') inQuotes = true;
                    else if (c === ',') { row.push(field); field = ""; }
                    else if (c === '\n' || c === '\r') {
                        if (c === '\r' && text[i + 1] === '\n') i++;
                        row.push(field); field = "";
                        rows.push(row); row = [];
                    } else field += c;
                }
            }
            if (field !== "" || row.length > 0) { row.push(field); rows.push(row); }
            if (rows.length === 0) return [];

            const header = rows[0].map(h => h.trim().toLowerCase());
            const nameIdx = header.indexOf('common name');
            if (nameIdx === -1) return [];

            const names = new Set();
            for (let i = 1; i < rows.length; i++) {
                const val = rows[i][nameIdx]?.trim();
                if (val) names.add(val);
            }
            return Array.from(names).sort();
        }

        // Parses a raw eBird "rare bird alert" style report (as exported to .docx, or plain
        // text/TSV) with lines like: Bird Name<TAB>Location<TAB>(lat, lng)<TAB>YYYY-MM-DD HH:MM
        // Returns sighting records compatible with the main record shape, deduped to the most
        // recent report per location+bird. Every entry is treated as Rare, matching the source
        // report's "unseen rare alerts" framing.
        function parseAlertReport(text) {
            const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            const byKey = new Map();
            const lineRe = /^(.+?)\t(.+?)\t\(([-\d.]+),\s*([-\d.]+)\)\t(\d{4}-\d{2}-\d{2}(?:\s+\d{2}:\d{2})?)$/;

            for (const line of lines) {
                const m = line.match(lineRe);
                if (!m) continue;
                const [, bird, location, lat, lng, dateStr] = m;
                const key = `${location.trim().toLowerCase()}|${bird.trim().toLowerCase()}`;
                const dt = new Date(dateStr.replace(' ', 'T'));
                const existing = byKey.get(key);
                if (!existing || dt > existing.dt) {
                    byKey.set(key, {
                        locationName: location.trim(),
                        coordinates: `${lat}, ${lng}`,
                        bird: bird.trim(),
                        rare: 'Y',
                        dt,
                        lastReported: isNaN(dt) ? dateStr : formatLongDate(dt)
                    });
                }
            }
            return Array.from(byKey.values());
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
