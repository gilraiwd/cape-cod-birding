<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // No seed data — the app starts empty. Populate it by syncing eBird (Settings > Sync Now),
        // uploading a sighting report, or adding sightings manually with "+ Sighting".
        const INITIAL_RAW_DATA = `Location Name	Coordinates	Bird	Rare (Y/N)	Last Reported`;

        // No default life list — "Seen" status is blank until a real life list is uploaded
        // (Import > Upload Life List CSV). Upload one per person to share this site; each gets
        // labeled and switchable, so nobody's data overwrites anyone else's (see savedLifeLists).
        const DEFAULT_LIFE_LIST = [];

        // Small curated fallback map, used only until the live eBird taxonomy has been
        // synced (see Settings > eBird API Key). Kept intentionally short — hand-typed
        // species code lists are exactly how wrong/missing links happen at scale, which is
        // why the app prefers the live taxonomy sync below for anything beyond these basics.
        const STATIC_EBIRD_CODE_MAP = {
            "Canada Goose": "cangoo",
            "Mallard": "mallar3",
            "Mourning Dove": "moudo1",
            "Great Blue Heron": "gbhero",
            "Red-tailed Hawk": "rthawk",
            "Osprey": "osprey",
            "Killdeer": "killde",
            "Common Loon": "comloo",
            "Double-crested Cormorant": "doccor",
            "Turkey Vulture": "turvul",
            "Bald Eagle": "baleag",
            "Ruby-throated Hummingbird": "rthhum"
        };

        // Resolves a bird's eBird species page URL. Prefers the live taxonomy map (synced
        // from eBird's official /ref/taxonomy/ebird endpoint — see Settings), falls back to
        // the small static map above, and only falls back to a plain search link if neither
        // has a match (e.g. taxonomy hasn't been synced yet, or the name doesn't resolve).
        function getEBirdUrl(birdName, taxonomyMap) {
            const cleanName = birdName.trim();
            const normalized = normalizeBirdName(cleanName);
            const liveCode = taxonomyMap && (taxonomyMap[normalized] || taxonomyMap[cleanName.toLowerCase()]);
            if (liveCode) {
                return `https://ebird.org/species/${liveCode}`;
            }
            const staticCode = STATIC_EBIRD_CODE_MAP[cleanName];
            if (staticCode) {
                return `https://ebird.org/species/${staticCode}`;
            }
            return `https://ebird.org/search?q=${encodeURIComponent(cleanName)}`;
        }

        // Safe localStorage helpers (no-ops if storage is unavailable, e.g. private browsing)
            const storageGet = (key, fallback) => {
                try {
                    const raw = window.localStorage.getItem(key);
                    return raw !== null ? JSON.parse(raw) : fallback;
                } catch (e) { return fallback; }
            };
            const storageSet = (key, value) => {
                try { window.localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
            };

        function App() {
            const [rawData, setRawData] = useState(() => storageGet('cbc_rawData', INITIAL_RAW_DATA));
            const [pastedData, setPastedData] = useState('');
            const [showSyncPanel, setShowSyncPanel] = useState(false);
            const [showImportPanel, setShowImportPanel] = useState(false);

            // Multiple named eBird life lists (Common Names), so this site can be shared — a
            // friend uploads their own life list export and switches to it to see their own
            // gaps, without anyone's data overwriting anyone else's. Seeded with the original
            // life list under "My Life List" the first time this loads (backward-compatible
            // with the previous single-life-list version of this app).
            const [savedLifeLists, setSavedLifeLists] = useState(() => {
                const existing = storageGet('cbc_savedLifeLists', null);
                if (existing) return existing;
                const legacyList = storageGet('cbc_lifeList', DEFAULT_LIFE_LIST);
                return { default: { label: 'My Life List', names: legacyList } };
            });
            const [activeLifeListId, setActiveLifeListId] = useState(() => storageGet('cbc_activeLifeListId', 'default'));
            const [newLifeListLabel, setNewLifeListLabel] = useState('');
            const lifeList = savedLifeLists[activeLifeListId]?.names || DEFAULT_LIFE_LIST;

            const [seenOverrides, setSeenOverrides] = useState(() => storageGet('cbc_seenOverrides', {}));
            const [hiddenLocations, setHiddenLocations] = useState(() => storageGet('cbc_hiddenLocations', []));
            const lifeListFileRef = useRef(null);
            const reportFileRef = useRef(null);

            useEffect(() => { storageSet('cbc_rawData', rawData); }, [rawData]);
            useEffect(() => { storageSet('cbc_savedLifeLists', savedLifeLists); }, [savedLifeLists]);
            useEffect(() => { storageSet('cbc_activeLifeListId', activeLifeListId); }, [activeLifeListId]);
            useEffect(() => { storageSet('cbc_seenOverrides', seenOverrides); }, [seenOverrides]);
            useEffect(() => { storageSet('cbc_hiddenLocations', hiddenLocations); }, [hiddenLocations]);

            const lifeListSet = useMemo(() => new Set(lifeList.map(normalizeBirdName)), [lifeList]);


            // --- eBird API integration (species codes + daily region sightings) --------------
            // The key is seeded with the one you gave us so the app works immediately; it's
            // stored in localStorage from then on (not hardcoded elsewhere) and can be changed
            // any time in Settings. Note this file will contain that key in plain text — treat
            // it like any personal credential and don't publish/share this file publicly.
            const [ebirdApiKey, setEbirdApiKey] = useState(() => storageGet('cbc_ebirdApiKey', 'l531bs6l4t92'));
            const [ebirdRegions, setEbirdRegions] = useState(() => storageGet('cbc_ebirdRegions', ['US-MA-001'])); // Barnstable County, MA
            const [newRegionInput, setNewRegionInput] = useState('');
            const [taxonomyMap, setTaxonomyMap] = useState(() => storageGet('cbc_taxonomyMap', {}));
            const [taxonomySyncedAt, setTaxonomySyncedAt] = useState(() => storageGet('cbc_taxonomySyncedAt', null));
            const [ebirdSyncedAt, setEbirdSyncedAt] = useState(() => storageGet('cbc_ebirdSyncedAt', null));
            const [isSyncing, setIsSyncing] = useState(false);
            const [syncError, setSyncError] = useState('');
            const [showSettingsPanel, setShowSettingsPanel] = useState(false);
            const [legendExpanded, setLegendExpanded] = useState(false); // collapsed by default — mostly for mobile screen space

            useEffect(() => { storageSet('cbc_ebirdApiKey', ebirdApiKey); }, [ebirdApiKey]);
            useEffect(() => { storageSet('cbc_ebirdRegions', ebirdRegions); }, [ebirdRegions]);
            useEffect(() => { storageSet('cbc_taxonomyMap', taxonomyMap); }, [taxonomyMap]);
            useEffect(() => { storageSet('cbc_taxonomySyncedAt', taxonomySyncedAt); }, [taxonomySyncedAt]);
            useEffect(() => { storageSet('cbc_ebirdSyncedAt', ebirdSyncedAt); }, [ebirdSyncedAt]);

            // Effective seen status for a record: a manual override (if any) wins, otherwise
            // it's derived from whether the bird is on the life list.
            const getSeen = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                if (Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey)) {
                    return seenOverrides[overrideKey];
                }
                return lifeListSet.has(normalizeBirdName(record.bird)) ? 'Y' : 'N';
            };

            const setSeenOverride = (record, value) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => ({ ...prev, [overrideKey]: value }));
            };

            const clearSeenOverride = (record) => {
                const overrideKey = `${record.locationName}|${record.bird}`.toLowerCase();
                setSeenOverrides(prev => {
                    const next = { ...prev };
                    delete next[overrideKey];
                    return next;
                });
            };

            // --- Hotspot management: hide (reversible, also excluded from future eBird syncs
            // so it doesn't silently come back) or permanently delete all records for a hotspot.
            const hideLocation = (locationName) => {
                setHiddenLocations(prev => prev.includes(locationName) ? prev : [...prev, locationName]);
                if (selectedLocation === locationName) setSelectedLocation('ALL');
                showToast(`Hid "${locationName}". Restore it any time in Settings.`);
            };

            const unhideLocation = (locationName) => {
                setHiddenLocations(prev => prev.filter(l => l !== locationName));
                showToast(`Restored "${locationName}".`);
            };

            const deleteLocation = (locationName) => {
                const updated = birdRecords.filter(rec => rec.locationName !== locationName);
                setRawData(recordsToTSV(updated));
                setHiddenLocations(prev => prev.filter(l => l !== locationName));
                if (selectedLocation === locationName) setSelectedLocation('ALL');
                showToast(`Deleted all records for "${locationName}".`);
            };

            // --- Date range filter ------------------------------------------------------------
            const [dateRangeFilter, setDateRangeFilter] = useState('ALL'); // ALL | 24H | 7D | 30D | CUSTOM
            const [customDateFrom, setCustomDateFrom] = useState('');
            const [customDateTo, setCustomDateTo] = useState('');

            const isWithinDateRange = (record) => {
                if (dateRangeFilter === 'ALL') return true;
                const recordDate = parseFlexibleDate(record.lastReported);
                if (isNaN(recordDate)) return true; // don't hide rows with unparseable dates
                if (dateRangeFilter === 'CUSTOM') {
                    if (customDateFrom && recordDate < new Date(customDateFrom)) return false;
                    if (customDateTo && recordDate > new Date(new Date(customDateTo).setHours(23, 59, 59, 999))) return false;
                    return true;
                }
                // "Last Reported" is stored as a calendar date only (no time-of-day — see
                // formatLongDate). A true rolling 24-hour window, at any point in the day, always
                // spans TWO calendar dates (e.g. checked at 9am, "last 24h" covers back to 9am
                // yesterday — touching both today's and yesterday's date). Restricting "Last 24h"
                // to today's date only was stricter than that and could show nothing even with
                // genuinely recent sightings, if the latest one happened to land on yesterday's
                // date. So: "24h" = today + yesterday, "7d"/"30d" = today plus the preceding N-1
                // calendar days — the most correct interpretation this data's precision allows.
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const daysBack = dateRangeFilter === '24H' ? 1 : dateRangeFilter === '7D' ? 6 : 29;
                const cutoff = new Date(startOfToday);
                cutoff.setDate(cutoff.getDate() - daysBack);
                return recordDate >= cutoff;
            };
            
            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL'); 
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL'); // Added bird selection state
            const [selectedRegion, setSelectedRegion] = useState('ALL'); // Filter by eBird region code
            const [sortBy, setSortBy] = useState('bird');
            const [toastMsg, setToastMsg] = useState('');

            // Install Prompt Intercept State
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            const [basemapStyle, setBasemapStyle] = useState('dark');
            const [leafletLoaded, setLeafletLoaded] = useState(false);
            const [mapReady, setMapReady] = useState(false);
            const [mapInitError, setMapInitError] = useState('');
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);
            const markerLayerGroup = useRef(null);
            const myLocationMarker = useRef(null);

            const [isAddOpen, setIsAddOpen] = useState(false);
            const [newBird, setNewBird] = useState({
                locationName: '', coordinates: '', bird: '', rare: 'N', lastReported: formatLongDate(new Date())
            });

            // Capture install criteria
            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });

                window.addEventListener('appinstalled', () => {
                    setIsInstallable(false);
                    showToast("Cape Cod Birding Console installed on Home Screen!");
                });
            }, []);

            const handleInstallApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                    setIsInstallable(false);
                }
            };

            const birdRecords = useMemo(() => {
                try {
                    return parseTSV(rawData);
                } catch (e) {
                    return [];
                }
            }, [rawData]);

            // birdRecords enriched with a computed `seen` field (life list match, or manual override),
            // with hidden hotspots excluded so they disappear from stats, map, and the list entirely.
            const enrichedRecords = useMemo(() => {
                return birdRecords
                    .filter(r => !hiddenLocations.includes(r.locationName))
                    .map(r => {
                        const overrideKey = `${r.locationName}|${r.bird}`.toLowerCase();
                        const isOverridden = Object.prototype.hasOwnProperty.call(seenOverrides, overrideKey);
                        return { ...r, seen: getSeen(r), isOverridden };
                    });
            }, [birdRecords, lifeListSet, seenOverrides, hiddenLocations]);

            const stats = useMemo(() => {
                const total = enrichedRecords.length;
                const seenCount = enrichedRecords.filter(r => r.seen === 'Y').length;
                const rareCount = enrichedRecords.filter(r => r.rare === 'Y').length;
                const priorityCount = enrichedRecords.filter(r => r.rare === 'Y' && r.seen === 'N').length;
                const uniqueSpots = new Set(enrichedRecords.map(r => r.locationName)).size;

                // Today's Targets: unseen rares reported today — the actionable, time-sensitive
                // subset. Uses the same calendar-day comparison as the "Last 24h" date filter
                // (see isWithinDateRange) since "Last Reported" is date-only, no time-of-day.
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const todayTargets = enrichedRecords.filter(r => {
                    if (r.rare !== 'Y' || r.seen !== 'N') return false;
