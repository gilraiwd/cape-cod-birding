    <script type="text/babel">

        const INITIAL_RAW_DATA = `Location Name	Coordinates	Bird	Rare (Y/N)	Last Reported

13 Oyster Pond Road, Harwich	41.7041082, -70.0473063	Common Tern	N	Wednesday, July 8, 2026
Ridgevale RD, South Chatham	41.6745337, -70.004765	Glossy Ibis	N	Wednesday, July 8, 2026
Holly Ridge Golf Course	41.682949, -70.455092	Ruby-crowned Kinglet	Y	Thursday, July 9, 2026`;

        const EBIRD_MAP = {
            "Canada Goose": "cangoo", "Mute Swan": "mutswa", "Mallard": "mallar3", "Mourning Dove": "moudo1",
            "Great Egret": "greegr", "Great Blue Heron": "gbhero", "Red-bellied Woodpecker": "rebwoo", "Red-tailed Hawk": "rthawk",
            "Chimney Swift": "chiswi", "Belted Kingfisher": "belkin1", "Surf Scoter": "sursco", "Rock Pigeon": "rocpig",
            "Roseate Tern": "roster", "Snowy Egret": "snoegr", "Black-crowned Night Heron": "bcnher", "Osprey": "osprey",
            "Northern Harrier": "norhar", "Eastern Phoebe": "easpho", "Wood Duck": "wooduc", "Yellow-crowned Night Heron": "ycnher",
            "American Black Duck": "ambduc", "Killdeer": "killde", "Least Sandpiper": "leasan", "Laughing Gull": "laugul",
            "Downy Woodpecker": "dowwoo", "Northern Flicker": "norfli", "Eastern Wood-Pewee": "eawope", "Red-breasted Merganser": "rebmer",
            "Spotted Sandpiper": "sposan", "Common Loon": "comloo", "Green Heron": "greher", "Semipalmated Plover": "semplo",
            "Piping Plover": "pipplo", "Short-billed Dowitcher": "shbdow", "Semipalmated Sandpiper": "semsan", "Little Blue Heron": "libher",
            "Hairy Woodpecker": "haiwoo", "Ring-billed Gull": "ribgul", "Double-crested Cormorant": "doccor", "Common Eider": "comeid",
            "Black Scoter": "blksco", "American Oystercatcher": "ameoys", "Hudsonian Whimbrel": "whimbr3", "Lesser Yellowlegs": "lesyel",
            "Bonaparte's Gull": "bongul", "Great Black-backed Gull": "gbbgul", "Bridled Tern": "briter1", "Forster's Tern": "forter",
            "Red-throated Loon": "retloo", "Wilson's Storm-Petrel": "wispet", "Cory's Shearwater": "corshe", "Great Shearwater": "greshe",
            "Sooty Shearwater": "sooshe", "Manx Shearwater": "manshe", "Northern Gannet": "norgan", "Long-tailed Jaeger": "lotjae",
            "South Polar Skua": "sopsku1", "White-winged Scoter": "wwscot", "Lesser Black-backed Gull": "lbbgul", "Iceland Gull": "icegul",
            "Black Tern": "blkter", "Arctic Tern": "arcter", "Wild Turkey": "wiltur", "Black-billed Cuckoo": "bibcuc",
            "Broad-winged Hawk": "brwhaw", "Willet (Eastern)": "willet1", "Willet": "willet1", "Greater Yellowlegs": "greyel",
            "Least Tern": "leater1", "Common Tern": "comter", "Glossy Ibis": "gloibi", "Eastern Whip-poor-will": "easwpw1",
            "Turkey Vulture": "turvul", "Red-shouldered Hawk": "reshaw", "Ruby-throated Hummingbird": "rthhum", "Willow Flycatcher": "wilfly",
            "Swallow-tailed Kite": "stkite", "Cooper's Hawk": "coohaw", "Bald Eagle": "baleag", "Barred Owl": "barowl", "Ruby-crowned Kinglet": "ruckin"
        };

        function App() {
            const [rawData, setRawData] = useState(INITIAL_RAW_DATA);
            const [manualSeen, setManualSeen] = useState({});
            const [searchQuery, setSearchQuery] = useState('');
            const [statusFilter, setStatusFilter] = useState('ALL');
            const [selectedLocation, setSelectedLocation] = useState('ALL');
            const [selectedBird, setSelectedBird] = useState('ALL');
            const [mapStyle, setMapStyle] = useState('dark');
            const mapContainerRef = useRef(null);
            const mapInstance = useRef(null);

            const birdRecords = useMemo(() => {
                const lines = rawData.trim().split('\n');
                const result = [];
                let currentLoc = "";
                let currentCoords = "";
                lines.forEach((line, i) => {
                    if (i === 0 && line.toLowerCase().includes('location name')) return;
                    const cols = line.split('\t');
                    if (cols.length < 3) return;
                    if (cols[0].trim() !== "") { currentLoc = cols[0].trim(); currentCoords = cols[1].trim(); }
                    result.push({
                        id: `${currentLoc}-${cols[2].trim()}-${i}`,
                        locationName: currentLoc,
                        coordinates: currentCoords,
                        bird: cols[2].trim(),
                        rare: cols[3]?.trim() || 'N'
                    });
                });
                return result;
            }, [rawData]);

            const filteredRecords = useMemo(() => {
                return birdRecords.filter(r => {
                    const matchesSearch = r.bird.toLowerCase().includes(searchQuery.toLowerCase()) || r.locationName.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesLoc = selectedLocation === 'ALL' || r.locationName === selectedLocation;
                    const matchesBird = selectedBird === 'ALL' || r.bird === selectedBird;
                    const seen = !!manualSeen[r.bird.toLowerCase()];
                    if (statusFilter === 'SEEN' && !seen) return false;
                    if (statusFilter === 'UNSEEN' && seen) return false;
                    return matchesSearch && matchesLoc && matchesBird;
                });
            }, [birdRecords, searchQuery, statusFilter, selectedLocation, selectedBird, manualSeen]);

            useEffect(() => {
                if (!mapContainerRef.current) return;
                mapInstance.current = L.map(mapContainerRef.current).setView([41.80, -70.30], 10);
                return () => mapInstance.current.remove();
            }, []);

            useEffect(() => {
                if (!mapInstance.current) return;
                mapInstance.current.eachLayer(l => { if (l instanceof L.TileLayer) mapInstance.current.removeLayer(l); });
                const url = mapStyle === 'streets' ? 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png' : mapStyle === 'satellite' ? 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}' : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
                L.tileLayer(url).addTo(mapInstance.current);
            }, [mapStyle]);

            useEffect(() => {
                if (!mapInstance.current) return;
                mapInstance.current.eachLayer(l => { if (l instanceof L.CircleMarker) mapInstance.current.removeLayer(l); });
                const locs = {};
                filteredRecords.forEach(r => {
                    if (!locs[r.locationName]) {
                        const coords = r.coordinates.split(',').map(Number);
                        locs[r.locationName] = L.circleMarker(coords, { radius: 8, color: '#10b981', fillOpacity: 0.7 }).addTo(mapInstance.current);
                        locs[r.locationName].bindPopup(r.locationName).on('click', () => setSelectedLocation(r.locationName));
                    }
                });
            }, [filteredRecords]);

            return (
                <div className="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
                    <header className="mb-8">
                        <h1 className="text-3xl font-black text-teal-400">CAPE COD BIRD SIGHTINGS</h1>
                        <p className="text-slate-400">Interactive Cape Code Bird Sighting Portal</p>
                    </header>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <h2 className="text-lg font-bold mb-3">Sighting Map</h2>
                                <div ref={mapContainerRef} className="h-64 w-full rounded-xl" />
                            </div>
                            <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                <input className="w-full bg-slate-950 p-3 rounded-lg border border-slate-700" placeholder="Search..." onChange={(e) => setSearchQuery(e.target.value)} />
                                <div className="mt-4 grid grid-cols-2 gap-2">
                                    {['ALL', 'SEEN', 'UNSEEN'].map(f => <button key={f} onClick={() => setStatusFilter(f)} className={`p-2 rounded-lg font-bold ${statusFilter === f ? 'bg-teal-500' : 'bg-slate-800'}`}>{f}</button>)}
                                </div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 max-h-[800px] overflow-y-auto">
                            <h2 className="text-lg font-bold mb-4">Species Ledger</h2>
                            {filteredRecords.map(r => (
                                <div key={r.id} onClick={() => setSelectedBird(r.bird)} className="p-3 mb-2 bg-slate-950 rounded-lg flex items-center justify-between cursor-pointer hover:border-teal-500 border border-transparent">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-slate-800 rounded-lg overflow-hidden shrink-0"><img src={`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(r.bird)}`.thumbnail?.source} onError={(e) => e.target.parentElement.classList.add('hidden')}/></div>
                                        <div><div className="font-bold">{r.bird}</div><a href={getEBirdUrl(r.bird)} target="_blank" className="text-teal-400 text-xs">eBird Details</a></div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); setManualSeen(prev => ({...prev, [r.bird.toLowerCase()]: !prev[r.bird.toLowerCase()]})); }} className={`px-2 py-1 rounded text-xs ${manualSeen[r.bird.toLowerCase()] ? 'bg-teal-500' : 'bg-slate-800'}`}>{manualSeen[r.bird.toLowerCase()] ? 'Seen' : 'Mark'}</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
