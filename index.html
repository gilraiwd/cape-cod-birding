<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cape Cod Birding Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- DATA UTILITIES ---
        // Parses your TSV format. 
        // We no longer rely on the "Seen" column in the file for the source of truth.
        const parseTSV = (text) => {
            const lines = text.trim().split('\n');
            return lines.slice(1).map((line, i) => {
                const cols = line.split('\t');
                if (cols.length < 3) return null;
                return {
                    id: i,
                    locationName: cols[0].trim(),
                    coordinates: cols[1].trim(),
                    bird: cols[2].trim(),
                    rare: cols[3]?.trim() || "N",
                    lastReported: cols[4]?.trim() || ""
                };
            }).filter(Boolean);
        };

        // Parses your eBird Life List CSV (Common Name is usually index 3)
        const parseLifeListCSV = (csvText) => {
            const lines = csvText.trim().split('\n');
            return new Set(lines.slice(1).map(line => line.split(',')[3]?.trim().toLowerCase()).filter(Boolean));
        };

        function App() {
            const [sightingsTSV, setSightingsTSV] = useState('');
            const [lifeListCSV, setLifeListCSV] = useState('');
            const [manualOverrides, setManualOverrides] = useState(
                JSON.parse(localStorage.getItem('birdOverrides') || '{}')
            );

            // Dynamically compare sighting data against life list
            const lifeListSet = useMemo(() => parseLifeListCSV(lifeListCSV), [lifeListCSV]);

            const birdRecords = useMemo(() => {
                const data = parseTSV(sightingsTSV);
                return data.map(record => ({
                    ...record,
                    // If in life list OR manually marked, set as seen
                    seen: (lifeListSet.has(record.bird.toLowerCase()) || manualOverrides[record.bird]) ? 'Y' : 'N'
                }));
            }, [sightingsTSV, lifeListSet, manualOverrides]);

            const toggleManualSeen = (birdName) => {
                const next = { ...manualOverrides, [birdName]: !manualOverrides[birdName] };
                setManualOverrides(next);
                localStorage.setItem('birdOverrides', JSON.stringify(next));
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6">
                    <h1 className="text-2xl font-black text-teal-400">Birding Life List Comparison</h1>
                    <div className="grid grid-cols-2 gap-4">
                        <textarea placeholder="Paste Sighting TSV (No Seen column required)..." 
                                  className="bg-slate-900 border border-slate-700 p-4 h-40 text-xs font-mono text-emerald-400" 
                                  onChange={(e) => setSightingsTSV(e.target.value)} />
                        <textarea placeholder="Paste eBird Life List CSV..." 
                                  className="bg-slate-900 border border-slate-700 p-4 h-40 text-xs font-mono text-sky-400" 
                                  onChange={(e) => setLifeListCSV(e.target.value)} />
                    </div>
                    
                    <div className="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden">
                        <div className="p-4 bg-slate-800 font-bold text-xs uppercase text-slate-400 flex justify-between">
                            <span>Species</span>
                            <span>Status</span>
                        </div>
                        {birdRecords.map(r => (
                            <div key={r.id} className="flex justify-between items-center p-3 border-b border-slate-800 last:border-0 hover:bg-slate-800">
                                <span className="font-bold text-sm">{r.bird}</span>
                                <button 
                                    onClick={() => toggleManualSeen(r.bird)}
                                    className={`px-3 py-1 text-[10px] font-black rounded uppercase ${r.seen === 'Y' ? 'bg-teal-500 text-slate-950' : 'bg-slate-700 text-slate-300'}`}
                                >
                                    {r.seen === 'Y' ? 'Seen' : 'Mark Seen'}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
